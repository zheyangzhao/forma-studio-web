body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#0f172a; }

@keyframes glowPulse {
  0%,100%{ box-shadow:0 0 14px 3px rgba(250,204,21,.4),0 0 28px 6px rgba(250,204,21,.15); }
  50%    { box-shadow:0 0 24px 6px rgba(250,204,21,.55),0 0 48px 12px rgba(250,204,21,.25); }

@keyframes dotPulse {
  0%,100%{ opacity:1; transform:scale(1); }

}
@keyframes fadeUp {
  from{ opacity:0; transform:translateY(10px); }

.sub-on  { background:rgba(250,204,21,.12); border-color:#facc15; color:#fde68a; }
.sub-off { background:rgba(30,41,59,.5); border-color:#334155; color:#94a3b8; }
.sub-off:hover{ border-color:#475569; color:#cbd5e1; }
