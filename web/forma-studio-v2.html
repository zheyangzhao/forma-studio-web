LE]\"}, hovering at correct scale.\nThe written instructions on the back become garden calendar, \"sow in spring\" manifests as actual spring light. \"full sun\" manifests as a single shaft of it, hitting the tallest bloom perfectly.\nScattered seeds between packet and soil each showing their germination stage, split coat, first root, first shoot, first leaf.\nThe packet's torn top edge becomes a treeline.\nPotting bench surface with soil scatter and water droplets.\nTilt-shift depth of field, greenhouse morning light, the packet as the garden it always intended.","industries":["marketing","design","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@AllaAisling","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ad-creative-144","no":144,"title":"Luxury Chronograph Watch Ad","size":"square","pixel":"","credit":"Author: @AlwaveNazca","prompt":"A dramatic luxury product advertising image for a motorsport-inspired chronograph wristwatch in a dark studio. Center-left foreground, show a single stainless steel chronograph watch standing upright at a slight three-quarter angle, with a black dial, two red-accent subdials, slim silver hour markers, a tachymeter bezel, and visible crown and pushers on the right side. The watch has a black leather strap with bold red stitching along both edges and a sporty premium finish. To the right of the watch, place one black square presentation box slightly behind it, textured like leather, with red stitching around the lid and a silver embossed eye-shaped logo above the text “NESS STUDIO” and smaller red text “TRACK SURFACE.” At the top center of the composition, add the same silver eye logo with the words “NESS STUDIO” and smaller “BY NICOLAS.” Across the background, place one oversized blurred word, {argument name=\"headline text\" default=\"PRECISION\"}, in large gray capital letters spanning nearly the full width. The scene is set against a deep black background with cinematic red and white horizontal light streaks crossing behind the products from left to right, suggesting speed and racetrack energy. Use a glossy wet ground plane with reflective texture, catching red highlights and mirrorlike reflections beneath the watch and box. At the bottom center, add the text “CHRONOGRAPH SERIES” in clean white spaced capitals with thin red horizontal lines extending on both sides, and below it smaller red capitals reading {argument name=\"tagline text\" default=\"ALSACE MADE\"}. Color palette: black, charcoal gray, silver steel, vivid racing red, and a touch of white. Lighting should be high-contrast and premium, with crisp specular highlights on the metal case, subtle soft fill on the box, and moody shadows. Overall style: ultra-polished commercial product photography, luxury watch campaign, sharp focus on the products, sleek branding, high-end automotive aesthetic.","industries":["marketing","design","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@AlwaveNazca","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ad-creative-145","no":145,"title":"Neon Nike Lumina Ad Poster","size":"square","pixel":"","credit":"Author: @AlwaveNazca","prompt":"A high-energy vertical Nike fashion campaign poster featuring a single athletic young woman mid-jump against a futuristic neon studio background. She is captured in a dynamic airborne pose with one knee bent up, the other leg folded back, one arm extended outward and the other bent near her chest, conveying motion and power. Her face is obscured by a clean rectangular blur block centered over the face. She wears a cropped iridescent white hooded windbreaker with a black zipper and small Nike logo on the chest, holographic metallic lavender-blue leggings with a subtle Nike swoosh on the thigh, a black branded waistband visible above the leggings, and white chunky Nike sneakers. Her brown hair is tied in a ompts"}}]},{"slug":"evolink-poster","category":"EvoLinkAI · Poster & Illustration","title_zh":"海報與插畫","industries":["marketing","events","design"],"use_cases":["活動海報","宣傳插畫","視覺主視覺"],"count":10,"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"},"prompts":[{"id":"evolink-poster-001","no":1,"title":"Boston Spring 2026 City Poster","size":"portrait","pixel":"","credit":"Author: @BubbleBrain","prompt":"A striking Spring 2026 city poster for Boston with an elegant celebratory mood and a bold contemporary design. On a clean off-white textured background with large areas of negative space, a miniature single sculler rows across the lower right corner of the image on a narrow ribbon of reflective water. The wake from the oar sweeps upward in a dynamic calligraphic curve, gradually transforming into the Charles River and then into a dreamlike hand-painted panorama of Boston. Inside this flowing river-shaped composition are iconic Boston elements: the Back Bay skyline, Beacon Hill brownstones, Acorn Street, Boston Public Garden, Swan Boats, Zakim Bridge, Fenway-inspired details, historic brick architecture, harbor ferries, and the city’s waterfront atmosphere. Soft morning fog, golden spring light, subtle festive accents in crimson and gold, rich detail, layered depth, sophisticated city-poster aesthetics, fresh and refined, visually powerful but not overcrowded. Elegant typography in the lower left reads “SPRING 2026” with a vertical slogan “BOSTON, A CITY OF RIVER, MEMORY, AND INVENTION”, text clear and beautifully composed, premium graphic design, 9:16","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@BubbleBrain","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-002","no":2,"title":"Vintage Amalfi Travel Poster","size":"portrait","pixel":"","credit":"Author: @WolfRiccardo","prompt":"Modern pencil illustration of Vintage travel poster illustration of the Amalfi Coast, Italy, panoramic coastal cliff road scene, classic 1960s white car driving along a curved seaside road, deep blue Mediterranean sea with small sailboats, colorful pastel hillside village, bright blue sky with soft clouds, lemon tree branches with vibrant yellow lemons framing the foreground, warm summer sunlight, bold vibrant colors, retro 1950s travel poster style, cinematic composition, high detail, screen print texture, graphic illustration. Hand-drawn style, illustration with loose strokes and defined contours. High-contrast color palette, maintaining chromatic harmony between background and elements. Contemporary and decorative aesthetic.","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@WolfRiccardo","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-003","no":3,"title":"Chengdu Food Map Illustration","size":"portrait","pixel":"","credit":"Author: @Panda20230902","prompt":"一张手绘风格的城市美食地图，以成都为主题。画面以鸟瞰视角的手绘简化城市地图为底，标注主要道路和地标但不追求精确比例而是追求可爱的手绘感。地图上分布着 12 个美食地点的精致手绘小插画：春熙路的串串香（一把竹签插着各种食材冒着热气）、宽窄巷子的三大炮（三个糯米团子飞向铜盘）、建设路的蛋烘糕（金黄酥脆正在翻面）、玉林路的火锅（九宫格锅翻滚冒泡）等，每个插画约占地图的 5% 面积，旁边用手写体标注店名和一句推荐语\"凌晨两点还在排队的那家\"。地图边缘用手绘藤蔓和辣椒装饰形成边框。右下角有一个手绘指南针和图例说明。左上角标题\"成都·吃货暴走地图\"使用胖圆的手绘美术字配辣椒装饰。整体画风为水彩+彩铅混合的手绘质感，颜色以暖色系（辣椒红、姜黄、翠绿）为主，图片比例 1:1。","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@Panda20230902","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-004","no":4,"title":"Chinese Minimalist S-Shaped Poster","size":"portrait","pixel":"","credit":"Author: @liyue_ai","prompt":"极简新中式美学风格，画面以淡雅的灰白色为底，呈现出一种纸艺剪影般的立体感。\n一条S形蜿蜒的裂痕状边缘将画面分割，仿佛撕开了一层纸面，露出内部色彩斑斓的东方山水景象。\n裂口内，一条蜿蜒的河流自上而下贯穿整个构图，河水以深浅不一的蓝色渲染，层次分明，仿佛流动的丝带。\n河岸两侧点缀着青翠的山丘与梯田，色彩柔和，绿红交织，展现出田园的宁静之美。\n沿河而建的古风建筑错落有致，飞檐翘角，白墙黛瓦，在光影的映衬下更显古朴典雅。\n岸边树木葱茏，枝叶轻盈，一艘小船静泊于水中央，增添了几分悠然意境。\n整体构图呈S形曲线，富有韵律感，仿佛自然与人文的和谐共生。\n画作边缘采用撕纸效果，营造出立体浮雕般的视觉体验。\n下方题字“东方美学”以黑色楷体书写，日期“2026/04/18”与红色印章相呼应，底部“CHINA”字样庄重醒目，署名“@LIYUE”低调收尾，整体氛围静谧深远，充满诗意与哲思。","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@liyue_ai","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-005","no":5,"title":"2026 Spring Guangzhou City Poster","size":"portrait","pixel":"","credit":"Author: @liyue_ai","prompt":"一张充满新春喜庆氛围但不失高雅格调的 2026 城市宣传海报。\n双重曝光，构图延续了S型的流动感；\n在纯白的纹理背景右下角，一个身穿中国传统服饰的微缩人物正在挥舞着一条长长的红色丝绸舞带，这条红绸在空中舞动，不仅展现出丝绸的柔顺质感，更在向左上方飘动的过程中，奇幻地变形成了一条壮丽的山脉河流。\n在这条“河流”中，叠加了一个有山有海河的广州城市手绘图，国潮，景色尽在眼底，壮阔雄伟，令人震撼。\n广州的地标建筑(广州塔，珠江新城建筑群，珠江, 广州城里古建筑，游轮，白云山）。\n云雾环绕，仙气缥缈，色彩丰富，结构复杂，细节丰富，但因为大面积的留白，画面依然显得清新脱俗，左下角排版着“SPRING 2026”和竖排的宣传语，整体寓意“千年商都，魅力广州”。\n文字排版优美，大方，字迹清晰完整，尺寸9:16。","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@liyue_ai","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-007","no":7,"title":"Doodle Sketch AI Builder","size":"portrait","pixel":"","credit":"Author: @blanplan","prompt":"以涂鸦速写风表现【一个厉害的AI builder】，整体呈现快速勾勒、自由变形、即兴手绘与草稿式的视觉效果。线条随手、夸张、可粗细不一，略显凌乱但具有节奏和表现力，强调概括、夸张、趣味和随性，而不是严谨写实或精细刻画。  颜色采用粗糙、干刷感明显的块面表现，可保留不均匀的涂抹痕迹、刷痕、飞白与覆盖感，色彩根据【主题/主体】自动适配，但整体保持涂鸦式、速写式、概括式的表达。不要透明水彩晕染效果，不要细腻水彩过渡，不要纸纹理，不要柔和雾化，不要梦幻质感。  背景以留白为主，保持简洁、轻松、未完成感和设计感，可加入少量辅助性符号、箭头、记号、圈画、重复线、随手写的文字或其他涂鸦元素，以增强速写本或随笔式视觉语言，但不可过于拥挤，不可破坏主体和留白气质。  画面内容不需要预先写清楚，由【一个厉害的AI builder】自动推演并生成最适合的主体形象、动作、相关元素、符号或简化场景，整体保持统一的涂鸦速写风和夸张概括的表现方式，避免复杂写实背景和过度铺陈。 画面中需自然加入专属签名“BlanPlan”，作为画面的一部分，位置低调但清晰，可放在左下角、右下角或标题附近，风格需与整体版式统一，像作品署名或设计落款；签名字体精致、克制、高级，不可过大，不可破坏主体构图，不可显得突兀或廉价。","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@blanplan","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-008","no":8,"title":"Futuristic Mandala Illustration","size":"portrait","pixel":"","credit":"Author: @4WEB1","prompt":"曼荼羅の近未来SF版を描いて","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@4WEB1","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-009","no":9,"title":"Super Famicom Poster Style","size":"portrait","pixel":"","credit":"Author: @lilimliliychan","prompt":"小悪魔リリムリリィちゃんが　スーパーファミコンのゲームだったときのポスターを考えて","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@lilimliliychan","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-010","no":10,"title":"Browser Game Ad Creative Poster","size":"portrait","pixel":"","credit":"Author: @llllegend0620","prompt":"以下の文字を必ず入れて、1:1のポスターを作成してください。書籍・講座・イベント告知に使える、プロの広告デザイナーが作ったような高品質な仕上がりにしてください。\n\n広告クリエイティブ制作\n思いついたら、もう遊べる。 AI×ブラウザゲームづくりは、マジで楽しい。 むずかしそうで、実ははじめやすい。 コードがわからなくても、はじめの一本は作れる","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@llllegend0620","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-poster-011","no":11,"title":"Surreal Koi Nebula Illustration","size":"portrait","pixel":"","credit":"Author: @liyue_ai","prompt":"一幅超现实主义数字插画风格，采用低角度仰拍视角。画面描绘了一条巨型彩色锦鲤遨游在梦幻般的星云中，四周环绕着色彩鲜艳的星云与气泡。画面中央还站着一个小人，背对观众，神情平静地仰望空中这条巨大的锦鲤，锦鲤头向下看着小人。整体画面呈现出强烈的大小对比，氛围空灵又梦幻。比例9:16","industries":["marketing","events","design"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@liyue_ai","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}}]},{"slug":"evolink-ui","category":"EvoLinkAI · UI & Social Media","title_zh":"UI 與社群素材","industries":["product","design"],"use_cases <script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useContext, createContext, useRef } = React;

/* ── 全域 API Key Context（session 期間共用，不存 localStorage）── */
const ApiCtx = createContext({ key:'', setKey:()=>{} });

/* ─────────────────────────────────────
   v2.0 Sprint 4: localStorage 持久化 helper
   - 全部 key 用 forma-v2.* 前綴避開 v1.1
   - storage 不可用時降級 session-only，不阻擋頁面
   - object 類資料含 schema_version，未來 migration 用
───────────────────────────────────── */
const LS_PREFIX = 'forma-v2.';
const LS_AVAILABLE = (() => {
  try {
    const t = '__forma_v2_test__';
    localStorage.setItem(t, '1');
    localStorage.removeItem(t);
    return true;
  } catch (e) {
    console.warn('[Forma Studio] localStorage 不可用，降級為 session-only', e);
    return false;
  }
})();

const LS = {
  available: LS_AVAILABLE,
  getStr(name, fallback = null) {
    if (!LS_AVAILABLE) return fallback;
    try { return localStorage.getItem(LS_PREFIX + name) ?? fallback; }
    catch (e) { return fallback; }
  },
  setStr(name, value) {
    if (!LS_AVAILABLE) return false;
    try { localStorage.setItem(LS_PREFIX + name, String(value)); return true; }
    catch (e) { console.warn('[LS] setStr 失敗', name, e); return false; }
  },
  getObj(name, expectedVersion = 1) {
    if (!LS_AVAILABLE) return null;
    try {
      const raw = localStorage.getItem(LS_PREFIX + name);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (obj && obj.schema_version === expectedVersion) return obj;
      console.warn('[LS] schema_version 不符，忽略', name, obj?.schema_version);
      return null;
    } catch (e) {
      console.warn('[LS] getObj 解析失敗，忽略', name, e);
      return null;
    }
  },
  setObj(name, data, version = 1) {
    if (!LS_AVAILABLE) return false;
    try {
      const payload = { schema_version: version, updated_at: new Date().toISOString(), data };
      localStorage.setItem(LS_PREFIX + name, JSON.stringify(payload));
      return true;
    } catch (e) {
      console.warn('[LS] setObj 失敗', name, e);
      return false;
    }
  },
  remove(name) {
    if (!LS_AVAILABLE) return;
    try { localStorage.removeItem(LS_PREFIX + name); } catch (e) {}
  },
  clearAll() {
    if (!LS_AVAILABLE) return 0;
    try {
      const toRemove = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(LS_PREFIX)) toRemove.push(k);
      }
      toRemove.forEach(k => localStorage.removeItem(k));
      return toRemove.length;
    } catch (e) { return 0; }
  },
  list() {
    if (!LS_AVAILABLE) return [];
    try {
      const out = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(LS_PREFIX)) out.push(k.slice(LS_PREFIX.length));
      }
      return out.sort();
    } catch (e) { return []; }
  },
};

/* useGallery：頂層 hook，從全域 FORMA_GALLERY 取資料並提供過濾 */
function useGallery() {
  const gallery = ENABLE_PROMPT_GALLERY ? FORMA_GALLERY : null;
  const categories = useMemo(() => gallery?.categories || [], [gallery]);
  const prompts = useMemo(() => categories.flatMap(cat =>
    (cat.prompts || []).map(p => ({
      ...p,
      category_slug: cat.slug,
      category: cat.category,
      title_zh: cat.title_zh,
      industries: cat.industries || [],
      source: p.source || gallery?.source || cat.source || null,
    }))
  ), [categories, gallery]);
  const filterByIndustries = useCallback((industries=[]) => {
    if (!industries.length) return prompts;
    return prompts.filter(p => p.industries.some(x => industries.includes(x)));
  }, [prompts]);
  const filterBySub = useCallback((sub, list=prompts) => {
    const slugs = SUB_TO_GALLERY_SLUGS[sub] || [];
    return list.filter(p => slugs.includes(p.category_slug));
  }, [prompts]);
  return useMemo(() => ({ enabled: !!gallery, categories, prompts, filterByIndustries, filterBySub }), [gallery, categories, prompts, filterByIndustries, filterBySub]);
}

const ENABLE_AI_ENHANCE = true;

/* system prompt 套 craft.md §19 final audit 精神（runtime 不 fetch markdown）*/
const ENHANCE_SYSTEM_PROMPT = `你是 Forma Studio 的 prompt 增強器。
依 craft.md §19 final audit 把使用者 prompt 改寫得更完整。
輸出僅包含改寫後 prompt，不含說明。

必須補強：
1. 任務意圖：image / edit / infographic / prototype / brand。
2. 受眾、渠道、決策情境。
3. 核心訊息一句話。
4. 構圖、版面、typography、color system、material / lighting。
5. in-image text 必須用引號逐字列出。
6. size、quality、negative constraints。
7. 反 AI Slop：禁紫漸變、generic card wall、emoji 圖標、假 logo、不可讀文字。
8. 若原 prompt 含 source attribution，必須保留。

不要新增未提供的具體品牌、人物、日期、法規或產品版本。若缺資訊，用 [PLACEHOLDER: ...] 標記。`;

async function enhancePromptWithOpenAI(promptText, apiKey) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model: 'gpt-4o-mini',
      temperature: 0.2,
      messages: [
        { role: 'system', content: ENHANCE_SYSTEM_PROMPT },
        { role: 'user', content: promptText },
      ],
    }),
  });
  if (!resp.ok) {
    const body = await resp.text().catch(()=>'');
    throw new Error(`enhance ${resp.status}: ${body.slice(0,180)}`);
  }
  const data = await resp.json();
  return data.choices?.[0]?.message?.content?.trim();
}

function EnhanceBtn({ text, onEnhanced, sm }) {
  const { key } = useContext(ApiCtx);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const noKey = !key.trim();
  const empty = !text?.trim();
  const disabled = !ENABLE_AI_ENHANCE || noKey || empty || loading;

  const tip = noKey
    ? '需要先輸入 OpenAI API key'
    : empty
    ? '尚無 prompt 可增強'
    : '套 craft.md §19 audit 增強 prompt';

  const run = async () => {
    if (disabled) return;
    setLoading(true);
    setErr('');
    try {
      const next = await enhancePromptWithOpenAI(text, key);
      if (next && next.trim()) {
        onEnhanced(next.trim());
      } else {
        setErr('回應為空，已保留原 prompt');
        setTimeout(()=>setErr(''), 3000);
      }
    } catch (e) {
      console.warn('[Forma Studio] enhance failed', e);
      setErr('AI 增強失敗，已保留原 prompt');
      setTimeout(()=>setErr(''), 3000);
    } finally {
      setLoading(false);
    }
  };

  return (
    <button
      onClick={run}
      disabled={disabled}
      title={tip}
      className={`rounded-lg font-bold transition-all ${sm?'px-2.5 py-1 text-xs':'px-3 py-1.5 text-xs'} ${
        disabled
          ? 'bg-slate-700 text-slate-500 cursor-not-allowed'
          : loading
          ? 'bg-purple-700 text-white'
          : 'bg-purple-600 hover:bg-purple-500 text-white'
      }`}>
      {loading ? '增強中...' : err ? `⚠️ ${err}` : '✨ AI 增強'}
    </button>
  );
}

    amber:   'border-amber-500/40 bg-amber-950/25 shadow-amber-900/20',

/* 共用 Chip 選擇器元件 */
function ChipPicker({ label, tip, options, value, onChange, multi=false }) {
  const isSelected = v => multi ? (value||[]).includes(v) : value===v;
  const toggle = v => {
    if (multi) {
      const cur = value||[];
      onChange(cur.includes(v) ? cur.filter(x=>x!==v) : [...cur, v]);
    } else {
      onChange(value===v ? '' : v);
    }
  };
  return (
    <div className="mb-3">
      <div className="flex items-center gap-1.5 mb-2">
        <span className="text-xs font-bold text-slate-300">{label}</span>
        {tip && <Tip text={tip}/>}
        {multi && (value||[]).length>0 && (
          <span className="ml-auto text-xs text-slate-500">{(value||[]).length} 項已選</span>
        )}
      </div>
      <div className="flex flex-wrap gap-1.5">
        {options.map(o=>{
          const v = typeof o==='string' ? o : o.v;
          const icon = typeof o==='object' ? o.icon : '';
          const note = typeof o==='object' ? o.note : '';
          return (
            <button key={v} onClick={()=>toggle(v)} title={note}
              className={`px-2.5 py-1.5 rounded-lg border text-xs font-medium transition-all ${
                isSelected(v)
                  ? 'border-yellow-400 bg-yellow-400/15 text-yellow-300'
                  : 'border-slate-600 bg-slate-800 text-slate-400 hover:border-slate-400 hover:text-slate-200'
              }`}>
              {icon && <span className="mr-1">{icon}</span>}{v}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* 規則判斷（不用 API，免費）
   v2.0 Truly-Neutral: 移除所有領域 fallback。任務型態仍偵測（簡報/圖像/...），
   但 nlm_domain 改為主題詞抽取（不分類），audience/imgStyle 改通用 fallback。
   醫療關鍵字仍偵測但改為「條件注入品質檢查」（不建立 domain=醫療）*/
function ruleAnalyze(txt) {
  const t = txt;
  const isSlide  = /簡報|slide|ppt|演講|呈現|介紹|教案|課程大綱/i.test(t);
  const isImage  = /圖片|圖像|插圖|image|ig|貼文|海報|banner|封面|插畫|圖示/i.test(t);
  const isInfo   = /資訊圖表|infographic|流程圖|比較圖|時間軸|統計|示意圖/i.test(t);
  const isProto  = /原型|prototype|ui|介面|app|mockup/i.test(t);
  const isBrand  = /品牌|logo|設計稿/i.test(t);
  const isTeach  = /教案|教學|課程|學習|課綱|入門|講義/i.test(t);
  const isLit    = /文獻|論文|research|paper/i.test(t);
  const isResume = /履歷|cv|resume/i.test(t);
  const isMedical = /tmj|顳顎|咬合|矯正|牙|口腔|磨牙|睡眠|鼾|植牙|解剖|臨床|患者|衛教/i.test(t);

  // NLM 建議
  const nlm_task = isResume?'文件整理':isTeach?'教學內容':isSlide?'簡報製作':/文件|整理/i.test(t)?'文件整理':isLit?'文獻分析':isImage?'圖片提示詞':'自由提問';

  // v2.0 Truly-Neutral: nlm_domain 改為「主題詞」抽取（不分類使用者領域）
  // 從輸入中抽取最具代表性的 1-3 個關鍵字（簡單實作：取前幾個非標點字串）
  const subjectTerms = (txt.match(/[一-龥a-zA-Z0-9]+/g) || []).filter(s => s.length >= 2).slice(0, 3);
  const nlm_domain = subjectTerms.length ? subjectTerms.join('、') : '依使用者輸入';

  // Framework: PICO 只在明確臨床研究問題時推薦；無命中走任務導向
  const nlm_fw = /pico|臨床研究|介入.*對照|outcome/i.test(t)?'PICO 臨床框架'
    : /提案|決策|商業|客戶/i.test(t)?'SCQA 決策框架'
    : isTeach?'六大元素框架'
    : isResume?'六大元素框架'
    : /學術|論文|imrad/i.test(t)?'IMRAD 實證框架'
    : 'GUIDE 寫作框架';  // 中性 fallback（不再 default IMRAD）

  // Audience fallback: 一般讀者（不再 default 患者/家長）
  const nlm_aud = /患者|病人/i.test(t)?'成人患者/家長'
    : /同行|專家/i.test(t)?'同領域專業人士'
    : /學生|學員|入門|初學/i.test(t)?'學生/學員'
    : /客戶|投資人|主管/i.test(t)?'投資人/合作夥伴'
    : '一般大眾';  // 中性 fallback

  // Design 建議
  const design_sub = isImage?'image':isInfo?'info':isProto?'proto':isBrand?'brand':'image';

  // imgType: 只在明確醫療詞時用 thinking；其餘 fallback gptimage2
  const design_imgType = isMedical?'gptimage2_thinking':'gptimage2';

  // imgStyle: 只在明確醫療詞時 default 醫學教科書；其餘走資訊海報
  const design_imgStyle = isMedical && /解剖|教科書|teach/i.test(t)?'醫學教科書'
    : /溫暖|親切|手繪|插畫/i.test(t)?'溫暖手繪'
    : /資訊圖|流程圖|統計|示意圖/i.test(t)?'資訊圖表'
    : /攝影|寫實|照片/i.test(t)?'攝影寫實'
    : /3d|立體|渲染/i.test(t)?'3D 寫實'
    : /極簡|線條|簡約/i.test(t)?'極簡線條'
    : /像素|pixel|8bit/i.test(t)?'像素藝術'
    : '資訊海報';  // 中性 fallback（取代醫學教科書）

  const reasons = [];
  if (isTeach) reasons.push('偵測到教學/課程 → 任務：教學內容，框架：六大元素');
  else if (isSlide) reasons.push('偵測到「簡報」→ 任務：簡報製作');
  else if (isResume) reasons.push('偵測到「履歷」→ 任務：文件整理');
  if (isImage) reasons.push('偵測到「圖片/海報」→ 設計子頁：圖像生成');
  if (isInfo) reasons.push('偵測到「資訊圖表/示意圖」→ 設計子頁：資訊圖表');
  if (subjectTerms.length) reasons.push(`主題詞：${subjectTerms.join('、')}（依使用者輸入，不歸類領域）`);
  if (isMedical) reasons.push('偵測到醫療相關詞 → 加入準確性檢查（不分類為醫療領域）');
  if (!reasons.length) reasons.push('依使用者輸入特徵推斷，無法明確分類時使用通用框架');

  return { nlm_task, nlm_domain, nlm_fw, nlm_aud, design_sub, design_imgType, design_imgStyle, subject_terms: subjectTerms, isMedical, reasons };
}

/* GPT-4o 深度分析（有 API Key 時使用）
   v2.0 Truly-Neutral: system prompt 完全中性，不假設使用者屬於任何領域、產業、職業。
   只判斷本次任務型態 + 萃取使用者輸入的特徵（主題詞、受眾線索、格式限制）。
   專有名詞（紫微斗數 / 植牙 / 客戶提案 / 微積分）一律進 subject_terms 主題詞，不擴展為領域分類。*/
async function gpt4oAnalyze(txt, apiKey) {
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method:'POST',
    headers:{ 'Content-Type':'application/json','Authorization':`Bearer ${apiKey}` },
    body: JSON.stringify({
      model:'gpt-4o-mini',
      max_tokens:400,
      messages:[{
        role:'system',
        content:`你是 Forma Studio 的中性 prompt 規劃助理。

# 嚴格規則
1. 你的任務是根據使用者一句話需求，產出後續工具可用的結構化建議。
2. 不要判斷使用者屬於任何領域、產業、身份或職業（不假設牙醫、命理老師、學生、行銷人員、設計師等）。
3. 不要把使用者輸入分類為醫療、命理、教育、商業、法律等領域。
4. 只判斷本次「要產出什麼內容」「給誰看」「格式限制」「風格線索」「品質要求」「明確提到的專有名詞」。
5. 所有專有名詞（如「紫微斗數」「植牙」「客戶提案」「微積分」「咖啡店」）一律進 subject_terms 主題詞，**不要擴展為領域分類**。
6. 沒有明確資訊時填中性預設：受眾「未指定」/「一般讀者」、風格「清楚易讀」、領域填「依使用者輸入主題」。
7. 只回傳 JSON，不要其他文字。

# JSON schema（向下相容舊欄位，但語意更中性）
{
  "nlm_task":"簡報製作|文件整理|文獻分析|圖片提示詞|教學內容|自由提問",
  "nlm_domain":"以使用者主題詞填寫（例：紫微斗數、植牙、咖啡店、履歷）；不要填領域分類",
  "nlm_fw":"IMRAD 實證框架|SCQA 決策框架|PICO 臨床框架|倒金字塔框架|GUIDE 寫作框架|六大元素框架",
  "nlm_aud":"依輸入推斷的受眾描述（例：一般讀者、初學者、學員、客戶、未指定）",
  "design_sub":"image|info|proto|brand",
  "design_imgType":"gptimage2|gptimage2_thinking",
  "design_imgStyle":"資訊海報|資訊圖表|極簡線條|溫暖手繪|攝影寫實|3D 寫實|醫學教科書|像素藝術",
  "subject_terms":["從輸入中抽取的主題詞陣列，例：[\\"紫微斗數\\",\\"入門課程\\"] 或 [\\"植牙\\",\\"衛教\\"]"],
  "audience_hint":"受眾線索描述（例：「初學者，輸入含『入門』」/「未提及，建議補問」）",
  "format_constraints":"格式限制（例：10 頁、A4 直式、IG 9:16）",
  "style_hints":"風格線索（例：溫暖、專業、復古；無提示就填『清楚易讀』）",
  "quality_checks":["品質要求陣列，例：[\\"避免錯誤健康資訊\\",\\"圖像不可有解剖錯誤\\"]（只在輸入明確含醫療詞時加入）"],
  "missing_info":["建議使用者補充的資訊"],
  "reasons":["一句話說明為什麼這樣判斷（最多3條，禁止寫「偵測到醫療領域」這種分類語）"]
}

# 範例
輸入「製作紫微斗數入門課程的 10 頁簡報」應產出：
- nlm_task: 簡報製作
- nlm_domain: 紫微斗數（主題詞，不是「命理/玄學」分類）
- nlm_aud: 初學者 / 學員（從「入門課程」推斷，不是「學生/實習醫師」）
- nlm_fw: 六大元素框架 或 GUIDE 寫作框架（不選 PICO，無臨床研究問題）
- design_imgStyle: 資訊海報 或 極簡線條（不選醫學教科書，無醫療詞）
- subject_terms: ["紫微斗數", "入門課程"]
- format_constraints: 10 頁
- quality_checks: [] 空陣列（無醫療詞）

輸入「植牙衛教海報」應產出：
- nlm_domain: 植牙衛教（主題詞）
- quality_checks: ["避免錯誤健康資訊", "結構標示需準確"]（醫療詞觸發）`
      },{ role:'user', content: txt }]
    })
  });
  const data = await res.json();
  const raw = data?.choices?.[0]?.message?.content||'{}';
  try { return JSON.parse(raw.replace(/```json|```/g,'')); }
  catch { return null; }
}

/* ─────────────────────────────────────
   TextWithFile — 文字框 + 附檔 + AI 分析
   任何 textarea 都可升級為此元件
───────────────────────────────────── */
function TextWithFile({ value, onChange, placeholder, rows=3, label, tip, id, accentColor='yellow', onFileContent }) {
  const { key: apiKey } = useContext(ApiCtx);
  const fileId   = useRef('twf-' + Math.random().toString(36).slice(2)).current;
  const [attached, setAttached] = useState(null);
  const [loading,  setLoading]  = useState(false);
  const [analyzing,setAnalyzing]= useState(false);

  const readFile = file => {
    if (!file) return;
    setLoading(true);
    const isImg = file.type.startsWith('image/');
    if (isImg) {
      setAttached({ name:file.name, content:`[圖片：${file.name}]` });
      setLoading(false);
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      const raw = typeof e.target.result==='string' ? e.target.result : '';
      const content = raw.slice(0, 3000);
      setAttached({ name:file.name, content });
      if (onFileContent) onFileContent(content);
      if (!value.trim()) onChange(content.slice(0, 600));
      setLoading(false);
    };
    reader.onerror = () => setLoading(false);
    reader.readAsText(file, 'utf-8');
  };

  const handleDrop = e => { e.preventDefault(); readFile(e.dataTransfer.files[0]); };

  const analyzeFile = async () => {
    if (!attached?.content || !apiKey.trim()) return;
    setAnalyzing(true);
    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${apiKey}` },
        body: JSON.stringify({
          model:'gpt-4o-mini', max_tokens:400,
          messages:[
            { role:'system', content:'你是一個 AI 設計助手。根據附件內容，用繁體中文寫一段 50-200 字的精簡摘要，描述這份素材的核心主題、風格傾向和可用於設計的關鍵資訊。' },
            { role:'user', content:`附件內容：\n${attached.content.slice(0,2000)}` }
          ]
        })
      });
      const data = await res.json();
      const summary = data?.choices?.[0]?.message?.content||'';
      if (summary) onChange((value?value+'\n\n':'') + `【AI 分析附件「${attached.name}」】\n${summary}`);
    } catch(e){}
    setAnalyzing(false);
  };

  const accent = accentColor==='teal' ? 'focus:border-teal-400' : 'focus:border-yellow-400';
  const accentBtn = accentColor==='teal' ? 'hover:border-teal-400/50 hover:text-teal-300' : 'hover:border-yellow-400/50 hover:text-yellow-300';

  return (
    <div>
      {(label||tip||true) && (
        <div className="flex items-center gap-1.5 mb-1.5 flex-wrap">
          {label && <span className="text-xs font-bold text-slate-300">{label}</span>}
          {tip && <Tip text={tip}/>}
          <div className="ml-auto flex items-center gap-1.5">
            {attached && (
              <span className="text-xs text-emerald-400 flex items-center gap-1 bg-emerald-900/20 px-2 py-0.5 rounded-lg border border-emerald-600/30">
                📎 {attached.name.length>20?attached.name.slice(0,18)+'…':attached.name}
                <button onClick={()=>{setAttached(null);}} className="text-slate-500 hover:text-red-400 ml-0.5 leading-none">×</button>
              </span>
            )}
            {attached && apiKey.trim() && (
              <button onClick={analyzeFile} disabled={analyzing}
                className={`text-xs px-2 py-0.5 rounded-lg border border-slate-600 text-slate-500 transition-all ${!analyzing?'hover:border-yellow-400/50 hover:text-yellow-300':''}`}>
                {analyzing?'分析中…':'🤖 AI 摘要'}
              </button>
            )}
            <label htmlFor={fileId}
              onDragOver={e=>e.preventDefault()}
              className={`cursor-pointer text-xs px-2 py-0.5 rounded-lg border border-slate-600 text-slate-500 transition-all ${!loading?accentBtn:'opacity-50'}`}>
              {loading?'讀取…':'📎 附檔'}
            </label>
            <input id={fileId} type="file" className="hidden"
              accept=".pdf,.doc,.docx,.txt,.md,.png,.jpg,.jpeg"
              onChange={e=>readFile(e.target.files[0])} disabled={loading}/>
          </div>
        </div>
      )}
      <div onDrop={handleDrop} onDragOver={e=>e.preventDefault()}>
        <textarea rows={rows} value={value} onChange={e=>onChange(e.target.value)}
          placeholder={placeholder}
          className={`w-full bg-slate-900 border border-slate-600 rounded-lg p-3 text-sm text-white placeholder-slate-600 ${accent} focus:outline-none resize-y`}/>
      </div>
      {!apiKey.trim() && attached && (
        <div className="text-xs text-slate-600 mt-1">設定 API Key 後可使用「AI 摘要」自動分析附件內容</div>
      )}
    </div>
  );
}

function stableGalleryShuffle(items) {
  const seed = new Date().toISOString().slice(0, 10);
  const hash = value => {
    let h = 2166136261;
    const s = `${seed}:${value}`;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  };
  return [...items].sort((a, b) => hash(a.id) - hash(b.id));
}

function useGalleryRandom(n=8) {
  const [state, setState] = useState({ loading:true, error:'', prompts:[], random:[] });

  useEffect(() => {
    let alive = true;
    loadPromptLibrary()
      .then(data => {
        if (!alive) return;
        const prompts = data.prompts || [];
        setState({
          loading:false,
          error:'',
          prompts,
          random:stableGalleryShuffle(prompts).slice(0, n),
        });
      })
      .catch(error => {
        if (!alive) return;
        setState({ loading:false, error:error.message || String(error), prompts:[], random:[] });
      });
    return () => { alive = false; };
  }, [n]);

  return state;
}

function smartKeywordTokens(text, ai, selSub, selTask) {
  const raw = [text, ai?.domain, ai?.framework, ai?.audience, selTask, selSub, ...(ai?.subject_terms || [])]
    .filter(Boolean).join(' ').toLowerCase();
  const tokens = (raw.match(/[a-z0-9]{2,}|[一-龥]{2,}/g) || []).slice(0, 24);
  const mapped = [];
  const add = (...xs) => xs.forEach(x => mapped.push(x));
  if (/海報|poster|活動|宣傳/.test(raw)) add('poster', 'typography', 'marketing');
  if (/簡報|課程|教學|學生|教育|入門/.test(raw)) add('education', 'infographic', 'field', 'guide');
  if (/文獻|論文|研究|資料|整理|research|paper/.test(raw)) add('research', 'scientific', 'data');
  if (/介面|原型|app|ui|dashboard|mockup/.test(raw) || selSub === 'proto') add('ui', 'ux', 'mockup', 'dashboard', 'product');
  if (/品牌|logo|識別|brand/.test(raw) || selSub === 'brand') add('brand', 'identity', 'systems');
  if (/咖啡|茶|產品|商品|電商|food|product/.test(raw)) add('product', 'food', 'ecommerce', 'poster');
  if (selSub === 'info') add('infographic', 'data', 'visualization', 'technical');
  if (selSub === 'image') add('poster', 'photography', 'illustration');
  return [...new Set([...tokens, ...mapped])].filter(t => t.length >= 2);
}

function pickSimilarGalleryPrompts(prompts, text, ai, selSub, selTask, limit=6) {
  if (!prompts?.length) return [];
  const tokens = smartKeywordTokens(text, ai, selSub, selTask);
  if (!tokens.length) return stableGalleryShuffle(prompts).slice(0, Math.min(3, limit));

  const scored = prompts.map(item => {
    const haystack = [
      item.searchText,
      item.categorySlug,
      item.categoryTitleZh,
      item.titleZh,
      ...(item.industries || []),
      ...(item.useCases || []),
    ].filter(Boolean).join(' ').toLowerCase();
    let score = 0;
    tokens.forEach(t => {
      if (haystack.includes(t)) score += t.length > 3 ? 2 : 1;
    });
    if (selSub === 'proto' && item.categorySlug === 'ui-ux-mockups') score += 4;
    if (selSub === 'brand' && item.categorySlug === 'brand-systems-and-identity') score += 4;
    if (selSub === 'info' && /infographics|data-visualization|technical/.test(item.categorySlug)) score += 4;
    if (selSub === 'image' && /typography|poster|photography|product/.test(item.categorySlug)) score += 3;
    return { item, score };
  }).filter(x => x.score > 0);

  const ranked = scored.sort((a, b) => b.score - a.score || a.item.no - b.item.no).map(x => x.item);
  const fallback = stableGalleryShuffle(prompts).filter(item => !ranked.some(x => x.id === item.id));
  return [...ranked, ...fallback].slice(0, Math.max(3, Math.min(6, limit)));
}

function buildNlmPrefillState({ task, domain, framework, audience, sourceText }) {
  const taskOk = TASKS_DB.some(t => t.value === task) ? task : '自由提問';
  const frameworkOk = FRAMEWORKS_DB.some(f => f.value === framework) ? framework : 'GUIDE 寫作框架';
  const domainOk = DOMAINS_DB.some(d => d.value === domain);
  const tone = /學生|學員|家長|患者|溫暖|教學/.test(`${audience} ${task}`)
    ? '溫暖同理（教學/使用者溝通用）'
    : /主管|投資人|客戶|決策|提案/.test(`${audience} ${task} ${sourceText}`)
      ? '精準簡潔（決策/管理用，直接說重點）'
      : '嚴謹論證（邏輯清晰，有前提有結論）';
  return {
    task: taskOk,
    domain: domainOk ? domain : '自訂領域',
    customDomain: domainOk ? '' : (domain || '依使用者輸入'),
    framework: frameworkOk,
    queryMode: '摘要型',
    depth: /入門|學生|大眾|初學/.test(`${audience} ${sourceText}`)
      ? '通俗易懂（完全不懂的人也看得懂）'
      : '行業標準（同領域從業人員）',
    tone,
    lang: '正體中文（術語附英文）',
    sourceText,
  };
}

function SmartTab({ goTab, onSendAudit, onApplyToDesign, onApplyToNLM }) {
  /* ── 狀態 ── */
  const [txt,       setTxt]       = useState('');
  const [fileInfo,  setFileInfo]  = useState(null);   // { name, type, content }
  const [fileLoading,setFileLoading] = useState(false);
  const [ai,        setAi]        = useState(null);
  // 可手動覆寫的選項

  const [selDomain, setSelDomain] = useState('');
  const [selFW,     setSelFW]     = useState('');
  const [selAud,    setSelAud]    = useState('');
  const [selSub,    setSelSub]    = useState('');
  const [selImgType,setSelImgType]= useState('');
  const [selImgStyle,setSelImgStyle]=useState('');
  const [out,       setOut]       = useState('');
  const [step,      setStep]      = useState(1);
  const [routeResult,setRouteResult] = useState(null);
  const [copyOk,    setCopyOk]    = useState(false);
  const [quickAuditOpen, setQuickAuditOpen] = useState(false);
  const [quickAuditApplied, setQuickAuditApplied] = useState(false);
  const gallery = useGalleryRandom(8);

  /* ── 檔案讀取 ── */
  const handleFile = (file) => {
    if (!file) return;
    setFileLoading(true);
    const reader = new FileReader();
    const isImage = file.type.startsWith('image/');
    reader.onload = (e) => {
      let content = '';
      if (isImage) {
        content = `[圖片檔案：${file.name}]`;
      } else {
        // text/plain, application/pdf placeholder, docx placeholder
        const raw = e.target.result;
        // take first 2000 chars as context
        content = typeof raw === 'string' ? raw.slice(0, 2000) : `[二進位檔案：${file.name}]`;
      }
      setFileInfo({ name: file.name, type: file.type, content });
      setFileLoading(false);
    };
    reader.onerror = () => { setFileLoading(false); };
    if (isImage) {
      reader.readAsDataURL(file);
    } else {
      reader.readAsText(file, 'utf-8');
    }
  };

  const handleDrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  /* ── AI 分析（文字 + 檔案合併判斷）── */
  const analyze = useCallback((t, fi) => {
    const combined = [t, fi?.name||'', fi?.content||''].join(' ');
    if (!combined.trim()) { setAi(null); setStep(1); setOut(''); setRouteResult(null); return; }

    const isSlide  = /簡報|slides?|ppt|演講|呈現|介紹|教案|課程大綱/i.test(combined);
    const isImage  = /圖片|圖像|插圖|image|ig貼文|貼文|海報|banner|封面/i.test(combined);
    const isInfo   = /資訊圖表|infographic|流程圖|比較圖|時間軸|統計/i.test(combined);
    const isProto  = /原型|prototype|ui|介面|app畫面|手機畫面|mockup/i.test(combined);
    const isBrand  = /品牌|logo|設計稿|設計方向/i.test(combined);
    const isDoc    = /整理|文件|markdown|obsidian/i.test(combined);
    const isLit    = /文獻|論文|research|paper|pubmed/i.test(combined);
    const isTeach  = /教案|教學|課程|學習|課綱/i.test(combined);

    let route='nlm', sub='nlm';
    if (isImage)      { route='design'; sub='image'; }
    else if (isInfo)  { route='design'; sub='info'; }
    else if (isProto) { route='design'; sub='proto'; }
    else if (isBrand) { route='design'; sub='brand'; }

    /* v2.0 Truly-Neutral: 加 isResume 偵測 → 文件整理 */
    const isResume = /履歷|cv|resume|自傳/i.test(combined);
    const task = isTeach?'教學內容'
      : isSlide?'簡報製作'
      : isResume?'文件整理'
      : isDoc?'文件整理'
      : isLit?'文獻分析'
      : isImage?'圖片提示詞'
      : '自由提問';

    /* v2.0 Truly-Neutral: domain 改為「主題詞抽取」（不再 fallback 到口腔醫學）*/
    const subjectTerms = (combined.match(/[一-龥a-zA-Z0-9]+/g) || [])
      .filter(s => s.length >= 2 && !/^(的|是|在|要|做|我|有|這|那|個|和|與|或|了|及|但|也|跟|還|都|很|請|幫|讓|給|到|去|來|看|寫|作|的話)$/.test(s))
      .slice(0, 4);
    const domain = subjectTerms.length ? subjectTerms.join('、') : '依使用者輸入';

    /* 醫療詞偵測（不建立 domain=醫療，只用於後續品質檢查條件注入）*/
    const isMedical = /tmj|顳顎|咬合|矯正|牙|口腔|磨牙|睡眠|鼾|植牙|解剖|臨床|患者|衛教/i.test(combined);
    /* isResume 已在上方 task 計算前宣告，不重複 */

    /* Framework: PICO 只在明確臨床研究時推薦；通用 fallback 改 GUIDE */
    const framework = /pico|臨床研究|介入.*對照|outcome/i.test(combined)?'PICO 臨床框架'
      : /決策|提案|商業|客戶|主管|投資人/i.test(combined)?'SCQA 決策框架'
      : /患者|衛教/i.test(combined)?'倒金字塔框架'
      : isTeach?'六大元素框架'
      : isResume?'六大元素框架'
      : /學術|文獻|論文|imrad/i.test(combined)?'IMRAD 實證框架'
      : 'GUIDE 寫作框架';  /* 中性 fallback（取代 IMRAD）*/

    /* Audience: 中性 fallback「一般大眾」；只在明確命中才特化 */
    const audience = /患者|病人/i.test(combined)?'成人患者/家長'
      : /同行|專家/i.test(combined)?'同領域專業人士'
      : /學生|學員|入門|初學/i.test(combined)?'學生/學員'
      : /家長|父母/i.test(combined)?'家長'
      : /客戶|投資人|主管/i.test(combined)?'投資人/合作夥伴'
      : isTeach?'學生/學員'
      : '一般大眾';  /* 中性 fallback */

    /* imgType: 只在明確醫療詞時用 thinking */
    const imgType = isMedical ? 'gptimage2_thinking' : 'gptimage2';

    /* imgStyle: 中性 fallback「資訊海報」；醫學教科書只在明確命中時 */
    const imgStyle= (isMedical && /解剖|教科書/i.test(combined))?'醫學教科書'
      : /溫暖|親切|手繪|插畫/i.test(combined)?'溫暖手繪'
      : /資訊圖|流程圖|統計|示意圖/i.test(combined)?'資訊圖表'
      : /攝影|寫實|照片/i.test(combined)?'攝影寫實'
      : /3d|立體|渲染/i.test(combined)?'3D 寫實'
      : /極簡|線條|簡約/i.test(combined)?'極簡線條'
      : /像素|pixel|8bit/i.test(combined)?'像素藝術'
      : '資訊海報';  /* 中性 fallback（取代醫學教科書）*/

    const philosophy= /溫暖|親切|有溫度/i.test(combined)?'雜誌編輯 · 雜誌敘事'
      : /簡潔|極簡/i.test(combined)?'瑞士國際主義 · 功能極簡'
      : /東方|水墨|文化|傳統/i.test(combined)?'水墨東方派'
      : '瑞士國際主義 · 功能極簡';  /* 中性 fallback */

    const reasons = [];
    if (fi)           reasons.push(`讀取到檔案「${fi.name}」→ 自動補充來源內容`);
    if (isTeach)      reasons.push('偵測到「教案/課程」→ 任務：教學內容，框架：六大元素');
    if (isSlide&&!isTeach) reasons.push('偵測到「簡報」需求 → 任務：簡報製作');
    if (isResume)     reasons.push('偵測到「履歷」需求 → 任務：文件整理');
    if (isImage)      reasons.push('偵測到「圖片/貼文/海報」需求 → 圖像生成');
    if (isInfo)       reasons.push('偵測到「資訊圖表/示意圖」需求 → 資訊圖表');

    if (subjectTerms.length) reasons.push(`抽取主題詞：${subjectTerms.join('、')}（依使用者輸入，不歸類領域）`);
    if (isMedical)    reasons.push('偵測到醫療相關詞 → 加入準確性檢查（不分類為醫療領域）');
    if (!reasons.filter(r=>r.includes('任務')||r.includes('需求')).length)
      reasons.push('依使用者特徵推斷，使用 GUIDE 寫作框架（中性通用）');

    const a = { route, sub, task, domain, framework, audience, imgType, imgStyle, philosophy, subject_terms: subjectTerms, isMedical, reasons };

/* ─────────────────────────────────────
   TAB B: NotebookLM 智慧指令中樞
   原版 5 步驟流程（完整保留）
───────────────────────────────────── */
function NLMTab({ landingNote, clearLandingNote, goTab, pendingPayload, consumePendingPayload }) {
  const [step, setStep] = useState(1);
  const [task, setTask] = useState('');
  const [domain, setDomain] = useState('');
  const [customDomain, setCustomDomain] = useState('');
  const [framework, setFramework] = useState('');
  const [queryMode, setQueryMode] = useState('');
  const [depth, setDepth] = useState('行業標準 (Industry)');
  const [tone, setTone] = useState('嚴謹論證');
  const [lang, setLang] = useState('正體中文');

  const activeDomain = domain==='自訂領域' ? (customDomain||'自訂領域') : domain;
  const ss = n => n<step?'done':n===step?'active':'future';

  useEffect(() => {
    if (pendingPayload?.targetTab !== 'nlm' || pendingPayload.kind !== 'nlm-state') return;
    const payload = pendingPayload.payload || {};
    const nextTask = TASKS_DB.some(t => t.value === payload.task) ? payload.task : '自由提問';
    const nextFramework = FRAMEWORKS_DB.some(f => f.value === payload.framework) ? payload.framework : 'GUIDE 寫作框架';
    const nextDomain = DOMAINS_DB.some(d => d.value === payload.domain) ? payload.domain : '自訂領域';
    setTask(nextTask);
    setDomain(nextDomain);
    setCustomDomain(nextDomain === '自訂領域' ? (payload.customDomain || payload.domain || '依使用者輸入') : '');
    setFramework(nextFramework);
    setQueryMode(payload.queryMode || '摘要型');
    if (payload.depth) setDepth(payload.depth);
    if (payload.tone) setTone(payload.tone);
    if (payload.lang) setLang(payload.lang);
    setStep(5);
    consumePendingPayload?.('nlm-state');
    setTimeout(()=>document.getElementById('ns5')?.scrollIntoView({behavior:'smooth',block:'center'}), 180);
  }, [pendingPayload, consumePendingPayload]);

  const Badge = ({n}) => {
    const s=ss(n);
    return <span className={`inline-flex items-center justify-center w-8 h-8 rounded-full font-bold text-sm shrink-0 ${s==='done'?'bg-emerald-600 text-white':s==='active'?'bg-yellow-400 text-slate-900 ring-2 ring-yellow-400/40':'bg-slate-700 text-slate-500'}`}>{s==='done'?'✓':n}</span>;
  };

  const Arrow = ({below}) => (
    <div className="flex justify-center py-1.5">
      <svg width="24" height="28" viewBox="0 0 24 28">
        <line x1="12" y1="0" x2="12" y2="20" stroke={below<=step?'#94a3b8':'#facc15'} strokeWidth="2.5" strokeDasharray={below<=step?'0':'5,3'} />
        <polygon points="5,18 12,27 19,18" fill={below<=step?'#94a3b8':'#facc15'} />
      </svg>
    </div>
  );

  /* 智慧導引套用 */
  const applyGuide = (r) => {
    const TASK_MAP = {'簡報製作':'簡報製作','文件整理':'文件整理','文獻分析':'文獻分析','圖片提示詞':'圖片提示詞','教學內容':'教學內容','自由提問':'自由提問'};

  const goStep = useCallback(n => {

  const pickTask  = id => { setTask(id);      setTimeout(()=>goStep(2),250); };
  const pickDom   = id => { setDomain(id);    if(id!=='自訂領域') setTimeout(()=>goStep(3),250); };

  const FWS = FRAMEWORKS_DB.map(f=>({id:f.value, title:f.label, desc:f.desc}));

  const genPrompt = () => {

API：model: "gpt-image-2-2026-04-21", quality: "high", n: 3
#AI圖片提示詞結束#

請確認後回覆「系統已就緒，請提供素材」。`;

    if (task==='教學內容') return `【任務指派：教學內容製作】

      };
      return `【任務指派：${qm}深度分析】

${qt[qm]}

語言：${lang} ｜ 深度：${depth} ｜ 語氣：${tone}

【🛑 Zero Hallucination】僅基於已上傳素材，不足標示「(素材未涉及)」。`;
    }
    return '';
  };

  const customInstruction = activeDomain ? `你是擁有 20 年經驗的「${activeDomain}」領域資深顧問，專精於將複雜專業知識轉譯為不同受眾能理解的內容。

格式：先 50 字摘要→結構化展開→2-3 個延伸問題。
語氣：${tone}，${lang}，術語附英文原文。` : '';

  const prompt = genPrompt();
  const canOut = step >= 5 && prompt;

  return (
    <div className="max-w-5xl mx-auto px-4 py-6">
      {landingNote?.targetTab === 'nlm' && (
        <NextStepCard
          tone={landingNote.tone || 'cyan'}
          title={landingNote.title || '已帶入跨頁籤內容'}
          body={landingNote.body}
          steps={[
            `來源：${landingNote.sourceLabel || landingNote.sourceTab || '其他頁籤'}`,
            '目標：NotebookLM 完整 5 step',
            landingNote.prefilled ? '狀態：已從 Smart 預填，可直接到 Step 5 產生指令，或回前面修改' : null,
          ].filter(Boolean)}
          actions={[
            { label:'我知道了', kind:'secondary', onClick:clearLandingNote },
            { label:'回 Smart', kind:'secondary', onClick:()=>goTab?.('smart') },
          ]}
        />
      )}
      <SmartGuide mode="nlm" onApply={applyGuide} />
      {[1,2,3,4,5].map(n => (
        <React.Fragment key={n}>
          {n>1 && <Arrow below={n} />}
          <section id={'ns'+n} className={`rounded-2xl border-2 border-slate-700 bg-slate-800/80 p-5 transition-all duration-300 ${sc(n)}`}>

              <h2 className="text-base font-bold text-white">
                {n===1?'選擇任務類型':n===2?'確立專業領域':n===3?(task==='自由提問'?'選擇提問模式':'選擇邏輯框架'):n===4?'微調輸出參數':'複製您的指令'}
              </h2>

            {n===1 && (
              <div>
                <div className="grid grid-cols-2 sm:grid-cols-3 gap-2.5 mb-3">

              </div>

            {/* 步驟 2：領域 - 分組顯示 */}
            {n===2 && <>
              {(() => {
                const groups = {};
                DOMS.filter(d=>d.id!=='自訂領域').forEach(d=>{
                  const g = DOMAINS_DB.find(x=>x.value===d.id)?.group || '其他';
                  if (!groups[g]) groups[g]=[];
                  groups[g].push(d);

                return Object.entries(groups).map(([gName, items])=>(
                  <div key={gName} className="mb-4">
                    <div className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">

              })()}
              {/* 自訂領域 */}
              <div className="mt-2 p-3 bg-slate-800/60 border border-slate-700 rounded-xl">

              <div className="text-3xl font-black text-slate-300">{(Object.values(scores).reduce((a,b)=>a+b,0)/5).toFixed(1)}</div>
            </div>
          </div>
        )}
        <button onClick={genReview} className="w-full py-3 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-bold rounded-lg text-sm transition-all mb-4">⭐ 生成 5 維度評審 Prompt</button>

function cleanTranslationMap(value) {
  if (!value || typeof value !== 'object' || Array.isArray(value)) return {};
  return Object.fromEntries(Object.entries(value).filter(([, text]) => typeof text === 'string' && text.trim()));
}

async function loadPromptZhTranslations() {
  try {
    const res = await fetch('./prompt-library/translations-zh.json', { cache:'no-store' });
    if (!res.ok) throw new Error(`translations-zh.json 載入失敗：HTTP ${res.status}`);
    const data = await res.json();
    if (![2, 3].includes(data?.schema_version)) {
      console.warn('[Forma Studio] translations-zh.json unknown schema_version', data?.schema_version);
    }
    if (!data?.titles || typeof data.titles !== 'object' || Array.isArray(data.titles)) {
      console.warn('[Forma Studio] translations-zh.json 缺少 titles object');
    }
    return {
      titles: cleanTranslationMap(data?.titles),
      summaries: cleanTranslationMap(data?.summaries),
      prompts: cleanTranslationMap(data?.prompts),
      schemaVersion: data?.schema_version || null,
    };
  } catch (error) {
    console.warn('[Forma Studio] translations-zh.json unavailable; falling back to English prompt library', error);
    return { titles:{}, summaries:{}, prompts:{}, schemaVersion:null };
  }
}

async function loadPromptLibrary() {
  const indexPromise = (async () => {
    const indexRes = await fetch('./prompt-library/gallery-index.json', { cache:'no-store' });
    if (!indexRes.ok) throw new Error(`gallery-index.json 載入失敗：HTTP ${indexRes.status}`);
    const index = await indexRes.json();
    if (!Array.isArray(index.categories)) throw new Error('gallery-index.json 缺少 categories array');
    return index;
  })();
  const [index, zhTranslations] = await Promise.all([indexPromise, loadPromptZhTranslations()]);

  const categoryData = await Promise.all(index.categories.map(async meta => {
    const res = await fetch(`./prompt-library/${meta.file}`, { cache:'no-store' });
    if (!res.ok) throw new Error(`${meta.file} 載入失敗：HTTP ${res.status}`);
    return { meta, data: await res.json() };
  }));

  const prompts = categoryData.flatMap(({ meta, data }) => {
    const categorySource = data.source || meta.source || index.source || {};
    return (data.prompts || []).map((p, idx) => {
      const source = p.source || categorySource || {};
      const industries = Array.isArray(p.industries) ? p.industries : (data.industries || meta.industries || []);
      const useCases = data.use_cases || meta.use_cases || [];
      const promptText = String(p.prompt || '');
      const title = p.title || `Prompt ${p.no || idx + 1}`;
      const id = p.id || `${meta.slug}-${p.no || idx + 1}`;
      const categoryTitle = data.category || meta.category || meta.slug;
      const categoryTitleZh = data.title_zh || meta.title_zh || data.category || meta.slug;
      const titleZh = zhTranslations.titles[id] || null;
      const summaryZh = zhTranslations.summaries[id] || null;
      const promptZh = zhTranslations.prompts[id] || null;
      const englishPreview = promptText.length > 180 ? `${promptText.slice(0, 180).trim()}...` : promptText;
      const searchParts = [
        title, titleZh, summaryZh, promptZh, promptText, data.category, data.title_zh, meta.category, meta.title_zh, categoryTitle, categoryTitleZh,
        ...(industries || []), ...(useCases || []), p.credit, source.author
      ];
      return {
        id,
        no: p.no || idx + 1,
        title,
        titleZh,
        summaryZh,
        promptZh,
        translationKey: id,
        prompt: promptText,
        englishPrompt: promptText,
        size: p.size || '',
        pixel: p.pixel || '',
        credit: p.credit || '',
        categorySlug: data.slug || meta.slug,
        categoryTitle,
        categoryTitleZh,
        industries,
        useCases,
        sourceRepo: source.repo || categorySource.repo || index.source?.repo || 'source n/a',
        sourceLicense: source.license || categorySource.license || index.source?.license || 'license n/a',
        sourceAuthor: source.author || '',
        sourceUrl: source.url || categorySource.url || index.source?.base_url || '',
        searchText: searchParts.filter(Boolean).join(' ').toLowerCase(),
        previewText: summaryZh || englishPreview,
      };
    });
  });

  const uniqueIds = new Set(prompts.map(p => p.id));
  const categoryCountSum = index.categories.reduce((sum, c) => sum + Number(c.count || 0), 0);
  const warnings = [];
  if (uniqueIds.size !== 116) warnings.push(`Unique prompt id 數為 ${uniqueIds.size}，預期 116`);
  if (categoryCountSum !== Number(index.total_count || 0)) {
    console.warn('[Forma Studio] category count sum mismatch', { categoryCountSum, total_count:index.total_count });
    warnings.push(`分類 count 加總 ${categoryCountSum} 不等於 index total ${index.total_count}`);
  }

  return { index, categories:index.categories, prompts, warnings };
}

  const [prompts, setPrompts] = useState([]);
  const [warnings, setWarnings] = useState([]);

  const [activeCategory, setActiveCategory] = useState('all');
  const [expandedIds, setExpandedIds] = useState([]);
  const [copiedId, setCopiedId] = useState('');
  const [favorites, setFavorites] = useState(() => {
    const saved = LS.getObj('plab.favorites');
    return new Set((saved?.data?.ids) || []);
  });
  const [favOnly, setFavOnly] = useState(false);

  const runLoad = useCallback(async () => {
    setLoading(true);
    setError('');
    try {
      const data = await loadPromptLibrary();
      setIndexMeta(data.index);
      setCategories(data.categories);
      setPrompts(data.prompts);
      setWarnings(data.warnings);
      setLoaded(true);
    } catch (e) {
      setError(e.message || String(e));
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    if (!loaded && !loading && !error) runLoad();
  }, [loaded, loading, error, runLoad]);

  const totalCount = indexMeta?.total_count || prompts.length;
  const normalizedQuery = query.trim().toLowerCase();
  const visiblePrompts = useMemo(() => prompts.filter(item => {
    if (favOnly && !favorites.has(item.id)) return false;
    const categoryOk = activeCategory === 'all' || item.categorySlug === activeCategory;
    const queryOk = !normalizedQuery || item.searchText.includes(normalizedQuery);
    return categoryOk && queryOk;
  }), [prompts, favOnly, favorites, activeCategory, normalizedQuery]);
  const sourceSummary = indexMeta?.sources || [];

  const toggleExpanded = id => setExpandedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  const toggleFavorite = id => {
    setFavorites(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      LS.setObj('plab.favorites', { ids: [...next] });
      return next;
    });
  };
  const copyPrompt = async item => {
    const textToCopy = item.englishPrompt || item.prompt || '';
    try {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(textToCopy);
      } else {
        const ta = document.createElement('textarea');
        ta.value = textToCopy;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
      }
      setCopiedId(item.id);
      setTimeout(() => setCopiedId(cur => cur === item.id ? '' : cur), 1800);
    } catch (e) {
      setError(`複製失敗：${e.message || e}`);
    }
  };

  const resetFilters = () => {
    setQuery('');
    setActiveCategory('all');
    setFavOnly(false);
  };

  return (
    <main className="max-w-6xl mx-auto px-4 py-6">

function runAudit(rawText) {
  const text = (rawText || '').trim();
  const lower = text.toLowerCase();
  const wordCount = text ? text.split(/\s+/).length : 0;
  const has = re => re.test(lower);
  const hasOrig = re => re.test(text);

  const checks = [
    {
      key: 'intent',
      label: '任務意圖',
      icon: '🎯',
      desc: 'image / edit / infographic / prototype / brand / poster 等清楚定位',
      status: has(/\b(image|photo|photograph|illustration|render|infographic|prototype|mockup|brand|poster|diagram|dashboard|chart|logo|avatar|sticker|icon|wallpaper|cover)\b/) ? 'pass' : 'fail',
      suggest: '加一個動作詞 + 媒材詞，例如「Create a photorealistic photograph of...」「Design a clean dashboard mockup that...」',
    },
    {
      key: 'audience',
      label: '受眾與情境',
      icon: '👥',
      desc: '受眾、使用場景或決策情境',
      status: (has(/\b(audience|target|for\s+\w+|users?|customers?|patients?|students?|investors?|clients?|readers?|viewers?|professionals?|beginners?)\b/) || has(/(受眾|觀眾|使用者|顧客|病患|學生|讀者)/)) ? 'pass' : 'warn',
      suggest: '指定受眾，例如「for a B2B SaaS founder」「for a coffee shop grand-opening flyer」「for a children\'s book cover」',
    },
    {
      key: 'message',
      label: '核心訊息',
      icon: '💡',
      desc: '一句話講清楚要傳達什麼',
      status: wordCount < 20 ? 'fail' : (wordCount < 60 ? 'warn' : 'pass'),
      suggest: 'prompt 字數應 ≥ 60 字。先寫一句「核心訊息」，再展開構圖細節。目前 ' + wordCount + ' 字。',
    },
    {
      key: 'composition',
      label: '構圖 / 版面 / 色彩',
      icon: '🎨',
      desc: 'composition / layout / typography / color / lighting / material',
      status: (has(/\b(composition|layout|grid|hierarchy|typography|font|color|palette|lighting|shadow|material|texture|background|foreground|aspect|frame|angle|perspective|depth)\b/) || has(/(構圖|版面|字體|色彩|光線|材質|背景|前景|視角)/)) ? 'pass' : 'warn',
      suggest: '補構圖/版面/色彩/光線細節，例如「3-column grid, deep navy + warm cream palette, soft window-light from left」',
    },
    {
      key: 'inImageText',
      label: 'in-image 文字',
      icon: '📝',
      desc: '若有文字必須用引號逐字列出',
      status: hasOrig(/["「『](.{1,80}?)["」』]/) ? 'pass' : (has(/\b(text|label|title|headline|caption|word|number|in-image)\b/) || has(/(文字|標題|標籤)/) ? 'warn' : 'pass'),
      suggest: '畫面中要出現的文字必須用引號標出，例如 in-image text "AURAE" / "Total balance $12,480.36"。AI 才不會亂寫字。',
    },
    {
      key: 'sizeQuality',
      label: 'size / quality / 反 negative',
      icon: '📐',
      desc: '尺寸、品質、不要什麼',
      status: (has(/\b(\d{3,4}x\d{3,4}|portrait|landscape|square|4k|hi-?res|high-resolution|production-quality|crisp|sharp)\b/) ? 'pass' : 'warn'),
      suggest: '指定尺寸（1024x1024 / portrait 1024x1536 / landscape）+ 品質詞（crisp、production-quality）+ 不要什麼（no lorem, no fake logo）',
    },
    {
      key: 'antiSlop',
      label: '反 AI Slop',
      icon: '🚫',
      desc: '避免紫漸變、卡片牆、emoji 圖示、假 logo、不可讀文字',
      status: (() => {
        const hits = [];
        PLAB_SLOP_RED_FLAGS.forEach(k => {
          let idx = 0;
          while ((idx = lower.indexOf(k, idx)) !== -1) {
            const before = lower.slice(Math.max(0, idx - 25), idx);
            const beforeOrig = text.slice(Math.max(0, idx - 25), idx);
            const negated = /\b(no|not|without|avoid|skip|exclude|never|don't|do not)\b[^.;]*$/.test(before)
              || /(不要|避免|沒有|別|不可|禁)[^。；]*$/.test(beforeOrig);
            if (!negated) hits.push(k);
            idx += k.length;
          }
        });
        return hits.length === 0 ? 'pass' : 'fail';
      })(),
      suggest: '若已含「purple gradient / generic card / emoji icon / stunning」等空話應移除（除非前面有 no / avoid / 不要 等否定詞）。',
    },
    {
      key: 'attribution',
      label: 'Source attribution',
      icon: '📎',
      desc: '若取自他人 prompt 必須保留 credit / by @author',
      status: has(/\b(by\s+@|author:|credit:|via:|source:)\b/) ? 'pass' : (text.length > 0 ? 'warn' : 'fail'),
      suggest: '若是自己原創可忽略；若改寫 gallery prompt，請保留作者欄位（例 "Author: @WolfRiccardo"）。',
    },
  ];

  const scoreMap = { pass: 100, warn: 50, fail: 0 };
  const total = checks.reduce((s, c) => s + scoreMap[c.status], 0);
  const score = Math.round(total / checks.length);
  const grade = score >= 85 ? 'A' : score >= 70 ? 'B' : score >= 55 ? 'C' : score >= 40 ? 'D' : 'F';
  const failCount = checks.filter(c => c.status === 'fail').length;
  const warnCount = checks.filter(c => c.status === 'warn').length;
  const passCount = checks.filter(c => c.status === 'pass').length;

  return { checks, score, grade, failCount, warnCount, passCount, wordCount };
}

function buildStylePrompt({ category, subject, picks, sizeId, qualityId }) {
  const cat = STYLE_CATEGORIES.find(c => c.id === category);
  if (!cat) return '';
  const size = STYLE_SIZES.find(s => s.id === sizeId);
  const quality = STYLE_QUALITIES.find(q => q.id === qualityId);
  const fragments = [];
  cat.groups.forEach(g => {
    const ids = picks[g.key] || [];
    ids.forEach(id => {
      const opt = g.options.find(o => o.id === id);
      if (opt) fragments.push(opt.en);
    });
  });
  const subjectClean = subject?.trim() || '[YOUR SUBJECT HERE]';
  const sizeStr = size ? ` Size: ${size.en} (${size.label}).` : '';
  const qualityStr = quality ? ` ${quality.en}.` : '';
  const fragStr = fragments.length ? ' ' + fragments.join('. ') + '.' : '';
  const negStr = ` ${cat.negatives}.`;
  return `${cat.leadIn} ${subjectClean}.${fragStr}${sizeStr}${qualityStr}${negStr}`.trim();
}

function LabTab({ goTab }) {
  const [mode,  setMode]  = useState('');
  const [input, setInput] = useState('');
  const [out,   setOut]   = useState('');

  const labs=[
    {id:'viral', icon:'🔥', name:'病毒傳播版',    desc:'把主題改寫成最容易社群瘋傳的版本'},
    {id:'ted',   icon:'🎤', name:'TED 風格版',     desc:'用 TED 開場鉤子+轉折+收尾宣言重組'},
    {id:'anti',  icon:'🚫', name:'反 AI Slop 診斷', desc:'貼入提示詞，找出所有 AI slop 問題'},
    {id:'batch', icon:'⚡', name:'四受眾批次',     desc:'一次生成 4 個不同受眾版本'},
  ];
  const hints={viral:'輸入簡報主題或摘要，改寫成最容易社群瘋傳的版本',ted:'輸入主題與核心觀點，用 TED 三段式重組',anti:'貼入已有的提示詞，診斷出所有 AI slop 問題',batch:'輸入主題，一次生成 4 個不同受眾版本'};
  const nextByMode = {
    viral: {
      title:'病毒傳播版已完成',
      body:'下一步建議進 NotebookLM，把這版當作簡報或社群腳本的任務指令，再用來源素材校準內容。',
      primary:'進 NotebookLM',
      steps:['複製實驗輸出', '進 NotebookLM 建立來源工作區', '要求 NotebookLM 依素材重寫成可發佈版本'],
    },
    ted: {
      title:'TED 風格版已完成',
      body:'下一步建議進 NotebookLM，用來源素材補足故事、證據與轉折，避免只留下漂亮結構。',
      primary:'進 NotebookLM',
      steps:['複製 TED 結構', '進 NotebookLM 上傳來源素材', '要求 NotebookLM 補齊例子與引用'],
    },
    batch: {
      title:'四受眾批次已完成',
      body:'下一步建議進 NotebookLM，將不同受眾版本與來源素材對齊，確認每版語氣與證據一致。',
      primary:'進 NotebookLM',
      steps:['複製四受眾版本', '進 NotebookLM 建立來源工作區', '逐一檢查受眾語氣與內容正確性'],
    },
    anti: {
      title:'反 AI Slop 診斷已完成',
      body:'下一步建議進體檢 & 增強，把原 prompt 或診斷輸出跑 8 維度體檢，再決定手動修或 AI 增強。',

      steps:['先修掉診斷出的通用美學問題', '送去體檢 & 增強看 8 維度缺口', '再進對應工具生成正式 prompt'],

    if(mode==='viral') setOut(`🔥 病毒傳播版改寫\n\n原主題：${input}\n\n▸ 病毒標題選項：\n  1. 「你以為大家都知道，其實 90% 的人都漏掉這個關鍵」\n  2. 「把複雜主題講到讓人立刻想分享的 5 個切角」\n  3. 「為什麼這件事現在值得你花 10 分鐘看懂」\n\n▸ 病毒開場 Hook（第 1 頁不用標題）：\n  「[具體痛苦情境]——如果你有過這個經歷，這份簡報就是為你準備的。」\n\n▸ 讓人截圖的高潮頁：\n  Quote Focus 版面，只有一句話，讓人看到就想截圖分享。`);
    else if(mode==='ted') setOut(`🎤 TED 風格結構\n\n主題：${input}\n\n▸ 開場鉤子（前 60 秒，不介紹自己）：\n  直接說一個意外的事實：「你以為你的症狀是因為 [常見誤解]，錯了。」\n\n▸ 核心觀念（Idea Worth Spreading）：\n  「[舊認知] 其實是 [新認知] 的結果，而你可以選擇從今天改變它。」\n\n▸ 轉折（意想不到的角度）：\n  用一個讓人沒想到的類比，把概念推進到更深的層次。\n\n▸ 收尾宣言（最後 30 秒）：\n  不是總結，是呼籲行動：讓人帶著一個具體的下一步離開。`);
    else if(mode==='anti') setOut(`🚫 AI Slop 診斷報告\n\n${['缺少角色宣言→加入完整角色扮演開場','缺少版面類型指定→每頁指定 Hero/Contrast/Icon Grid 等','未定義設計系統→加入 hex 色碼、字型名稱','敘事結構模糊→明確指定三幕劇/問題-解決-行動等架構','禁令不明確→明確列出禁用句型和設計模式'].map((x,i)=>`問題 ${i+1}：${x.split('→')[0]}\n→ ${x.split('→')[1]}`).join('\n\n')}\n\n💡 用智慧入口或 NotebookLM 頁籤重新生成，以上問題都會自動解決。`);
    else if(mode==='batch') {
      const auds=[['一般大眾版','故事驅動，製造好奇心'],['專業人士版','可用術語，強調依據與決策脈絡'],['客戶/合作夥伴版','價值導向，凸顯行動效益'],['學生/學員版','教學導向，含練習與測驗']];
      setOut(`⚡ 四受眾批次提示詞\n主題：${input}\n${'═'.repeat(32)}\n\n${auds.map(([n,t],i)=>`▼ 版本 ${i+1}：${n}\n你是頂尖簡報設計師。根據來源為「${input}」製作 10 頁簡報。\n受眾：${t}\n問題-解決-行動結構。版面多樣化。禁 AI slop。\n${'─'.repeat(20)}`).join('\n\n')}`);
    }
  };

  return (
    <div className="max-w-5xl mx-auto px-4 py-6">
      <h2 className="text-xl font-bold text-white mb-1">彩蛋 Lab 🧪</h2>
      <p className="text-sm text-slate-400 mb-5">實驗性功能。效果可能出人意料。</p>
      <div className="grid grid-cols-2 gap-3 mb-5">
        {labs.map(l=>(
          <button key={l.id} onClick={()=>setMode(l.id)}
            className={`text-left p-4 rounded-xl border-2 transition-all ${mode===l.id?'border-purple-400 bg-purple-400/10':'border-slate-600 bg-slate-800/50 hover:border-purple-400/50'}`}>
            <div className="text-2xl mb-1.5">{l.icon}</div>
            <div className="text-sm font-bold text-purple-300 mb-0.5">{l.name}</div>
            <div className="text-xs text-slate-400">{l.desc}</div>
          </button>
        ))}
      </div>
      {mode && <>
        <div className="mb-3">
          <TextWithFile
            value={input} onChange={setInput} rows={4}
            placeholder="輸入內容，或上傳文件讓 AI 自動提取關鍵內容…"
            label={hints[mode]}
            accentColor="yellow"
          />
        </div>
        <button onClick={run} className="w-full py-3 bg-purple-600 hover:bg-purple-500 text-white font-bold rounded-lg text-sm transition-all mb-4">🧪 執行實驗</button>
      </>}
      <OutBox text={out} label="🧪 實驗輸出"/>
      {out && nextByMode[mode] && (
        <NextStepCard
          tone={mode === 'anti' ? 'amber' : 'cyan'}
          title={nextByMode[mode].title}
          body={nextByMode[mode].body}
          steps={nextByMode[mode].steps}
          actions={mode === 'anti'
            ? [
                { label:'前往 體檢 & 增強', kind:'primary', onClick:()=>goTab?.('audit', {
                  targetTab:'audit',
                  sourceTab:'lab',
                  sourceLabel:'彩蛋 Lab',
                  title:'來自 Lab 反 AI Slop 診斷',
                  body:'已把反 AI Slop 診斷輸出送到體檢頁，可用 8 維度再檢查 prompt。',
                  prompt: out,
                  tone:'rose',
                }) },
                { label:nextByMode[mode].primary, kind:'secondary', onClick:()=>navigator.clipboard?.writeText(out).catch(()=>{}) },
                { label:'回 Smart 重新分類', kind:'secondary', onClick:()=>goTab?.('smart') },
              ]
            : [
                { label:nextByMode[mode].primary, kind:'primary', onClick:()=>goTab?.('nlm', {
                  targetTab:'nlm',
                  sourceTab:'lab',
                  sourceLabel:'彩蛋 Lab',
                  title:`來自彩蛋 Lab：${nextByMode[mode].title}`,
                  body:'實驗輸出已完成。請複製上方內容，進 NotebookLM 後搭配來源素材使用。',
                  tone:'cyan',
                }) },
                { label:'複製實驗輸出', kind:'secondary', onClick:()=>navigator.clipboard?.writeText(out).catch(()=>{}) },
                { label:'回 Smart 重新分類', kind:'secondary', onClick:()=>goTab?.('smart') },
              ]}
        />
      )}
    </div>
  );
}

function SettingsPanel({ open, onClose }) {
  const [confirmClearAll, setConfirmClearAll] = useState(false);
  const [refreshKey, setRefreshKey] = useState(0);
  const refresh = () => setRefreshKey(k => k + 1);

  useEffect(() => {
    if (!open) return;
    const handleKeyDown = e => {
      if (e.key === 'Escape') onClose?.();
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [open, onClose]);

  if (!open) return null;

  const apiRemember = LS.getStr('api-key-remember', 'false') === 'true';
  const apiKeyExists = !!LS.getStr('api-key');
  const lastTab = LS.getStr('last-tab');
  const tabLabels = { smart:'🖼️ 智慧製圖', design:'🎨 Claude Design', nlm:'📑 NotebookLM', promptlab:'📚 提示詞庫', plab:'📚 提示詞庫', audit:'🩺 體檢 & 增強', style:'🎬 風格實驗室', lab:'彩蛋 🧪' };
  const favoritesObj = LS.getObj('plab.favorites');
  const favCount = favoritesObj?.data?.ids?.length || 0;
  const styleObj = LS.getObj('style.last-state');
  const stylePref = styleObj?.data?.cat_id;
  const historyObj = LS.getObj('audit.history');
  const historyCount = historyObj?.data?.items?.length || 0;
  const lsKeys = LS.list();

  const removeKey = name => { LS.remove(name); refresh(); };
  const clearAll = () => {
    const n = LS.clearAll();
    setConfirmClearAll(false);
    refresh();
    setTimeout(() => {
      if (window.confirm(`已清除 ${n} 筆 v2 本地資料。重新載入頁面以套用全部預設？`)) location.reload();
    }, 200);
  };

  return (
    <div className="fixed inset-0 z-[100] bg-black/60 flex items-start justify-center p-4 overflow-y-auto fade-in" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        className="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-2xl mt-10 mb-10">
        <div className="flex items-center justify-between p-4 border-b border-slate-700 sticky top-0 bg-slate-900">
          <div>
            <h2 className="text-base font-bold text-slate-100">⚙️ v2 設定</h2>
            <p className="text-[11px] text-slate-500 mt-0.5">本地資料管理 · API Key · 隱私邊界</p>
          </div>
          <button onClick={onClose} aria-label="關閉設定面板" className="text-slate-500 hover:text-slate-300 text-lg">✕</button>
        </div>

        <div className="p-4 space-y-4" key={refreshKey}>
          {!LS.available && (
            <div className="rounded-xl border border-amber-500/40 bg-amber-500/5 p-3 text-xs text-amber-200">
              ⚠️ 此瀏覽器無法寫入 localStorage。本頁仍可用，但任何持久化都會降級為 session-only。
            </div>
          )}

          <section>
            <h3 className="text-sm font-bold text-slate-200 mb-2">🔑 OpenAI API Key</h3>
            <div className="rounded-xl border border-slate-700 bg-slate-900/50 p-3 text-xs">
              <div className="flex items-center justify-between gap-2 mb-1">
                <span className="text-slate-400">記住此設備</span>
                <span className={apiRemember?'text-amber-300 font-bold':'text-slate-500'}>{apiRemember?'已啟用':'未啟用（session-only）'}</span>
              </div>
              <div className="flex items-center justify-between gap-2 mb-1">
                <span className="text-slate-400">localStorage 中是否有 key</span>
                <span className={apiKeyExists?'text-amber-300 font-bold':'text-slate-500'}>{apiKeyExists?'有（已保存）':'沒有'}</span>
              </div>
              <div className="text-[11px] text-slate-500 mt-2 leading-relaxed">

                <span className="block mt-1 text-[11px] text-slate-500">不會碰其他網站或其他 key。</span>
              </div>
              {!confirmClearAll ? (
                <button onClick={()=>setConfirmClearAll(true)}
                  className="w-full py-2 bg-rose-600/20 hover:bg-rose-600/30 border border-rose-500/40 text-rose-300 text-xs font-bold rounded-lg">
                  🗑️ 我要清除所有 v2 本地資料…
                </button>
              ) : (
                <div className="space-y-2">
                  <div className="text-[11px] text-rose-300 font-bold">確定？此動作不可還原。</div>
                  <div className="flex gap-2">
                    <button onClick={clearAll} className="flex-1 py-2 bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold rounded-lg">確認清除全部</button>
                    <button onClick={()=>setConfirmClearAll(false)} className="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs rounded-lg">取消</button>
                  </div>
                </div>
              )}
            </div>
          </section>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────────────────
   ROOT
───────────────────────────────────── */
function App() {
  const [tab,    setTab]    = useState(() => validateTabId(LS.getStr('last-tab', 'smart')));
  const [apiKey, setApiKey] = useState(() => (
    LS.getStr('api-key-remember', 'false') === 'true' ? LS.getStr('api-key', '') : ''
  ));   // 預設 session-only；使用者 opt-in 才存 localStorage
  const [pendingPayload, setPendingPayload] = useState(null);
  const [settingsOpen, setSettingsOpen] = useState(false);

  const tabs=[
    {id:'smart', label:'🖼️ 智慧製圖'},
    {id:'design',label:'🎨 Claude Design'},
    {id:'nlm',   label:'📑 NotebookLM'},
    {id:'promptlab', label:'📚 提示詞庫'},
    {id:'audit', label:'🩺 體檢 & 增強'},
    {id:'style', label:'🎬 風格實驗室'},
  ];

  const normalizeSourceTab = useCallback(source => tabs.some(t => t.id === source) ? source : tab, [tab]);
  const noteFor = (targetTab, sourceTab, note) => note ? { ttlMs: 10000, createdAt: Date.now(), ...note, targetTab, sourceTab } : null;

  const dispatch = useCallback((targetTab, kind='note-only', payload=null, note=null) => {
    const validTarget = validateTabId(targetTab);
    const sourceTab = normalizeSourceTab(note?.sourceTab);
    setTab(validTarget);
    LS.setStr('last-tab', validTarget);
    setPendingPayload({ targetTab: validTarget, sourceTab, kind, payload, note: noteFor(validTarget, sourceTab, note) });
  }, [normalizeSourceTab]);

  const goTab = useCallback((nextTab, note=null) => {
    const validTarget = validateTabId(note?.targetTab || nextTab);
    const kind = validTarget === 'audit' && note?.prompt ? 'audit-text' : 'note-only';
    const payload = kind === 'audit-text' ? { text: note.prompt, source: normalizeSourceTab(note?.sourceTab) } : null;
    dispatch(nextTab, kind, payload, note);
  }, [dispatch, normalizeSourceTab]);

  const sendPromptToAudit = useCallback((prompt, sourceLabel='其他頁籤') => {
    if (!prompt?.trim()) return;
    dispatch('audit', 'audit-text', { text: prompt, source: tab }, {
      targetTab:'audit',
      sourceTab:tab,
      sourceLabel,
      title:`來自${sourceLabel}的 prompt`,
      body:'已帶入體檢 & 增強頁，請看 8 維度分數與可補強處。',
      tone:'amber',
    });
  }, [dispatch, tab]);

  useEffect(() => {
    const note = pendingPayload?.note;
    if (!note?.ttlMs) return;
    const timer = setTimeout(() => setPendingPayload(cur => cur?.note !== note ? cur : (cur.payload ? { ...cur, note: null } : null)), note.ttlMs);
    return () => clearTimeout(timer);
  }, [pendingPayload]);

  const landingNote = pendingPayload?.note || null;
  const clearLandingNote = useCallback(() => setPendingPayload(cur => !cur ? null : (cur.payload ? { ...cur, note: null } : null)), []);
  const consumePendingPayload = useCallback(kind => {
    setPendingPayload(cur => {
      if (!cur || cur.kind !== kind) return cur;
      return cur.note ? { ...cur, kind: 'note-only', payload: null } : null;
    });
  }, []);

  const applyPromptToDesign = promptItem => {
    dispatch('design', 'design-prompt', { id: promptItem.id, title: promptItem.title, prompt: promptItem.englishPrompt || promptItem.prompt, source: 'promptlab' }, {
      targetTab: 'design',
      sourceTab: 'promptlab',
      sourceLabel: 'Prompt Lab 提示詞庫',
      title: '已從 Prompt Lab 套用英文 prompt',
      body: `來源：${promptItem.titleZh || promptItem.title}。目標：Claude Design Step 1。已預填英文原文 prompt，可先檢查內容再繼續設計流程。`,
      tone: 'cyan',
    });
  };

  const applyAuditToDesign = (text, kind) => {
    dispatch('design', 'design-prompt', { id: `audit-${kind || 'original'}`, title: kind === 'enhanced' ? 'AI 增強版 prompt' : 'Audit 原始 prompt', prompt: text, source: 'audit' }, {
      targetTab:'design', sourceTab:'audit', sourceLabel:'體檢 & 增強',
      title: kind === 'enhanced' ? '已套用 AI 增強版 prompt' : '已套用體檢 prompt',
      body:'目標：Claude Design Step 1。已預填從 Audit 帶回的 prompt，可先檢查內容再繼續設計流程。',
      tone: kind === 'enhanced' ? 'emerald' : 'amber',
    });
  };

  const applyStyleToDesign = text => {
    dispatch('design', 'design-prompt', { id: 'style-studio-prompt', title: 'Style Studio 英文 prompt', prompt: text, source: 'style' }, {
      targetTab:'design', sourceTab:'style', sourceLabel:'風格實驗室', title:'已套用風格實驗室組好的英文 prompt',
      body:'目標：Claude Design Step 1。已預填由 5 類別 chips 組好的英文 prompt，可先檢查內容再繼續設計流程。', tone:'amber',
    });
  };

  const applySmartToDesign = text => {
    dispatch('design', 'design-prompt', { id: 'smart-c2-prompt', title: 'Smart 生成 prompt', prompt: text, source: 'smart' }, {
      targetTab:'design', sourceTab:'smart', sourceLabel:'Smart 智慧製圖', title:'已從 Smart 帶入 prompt',
      body:'已帶入 Claude Design Step 1，可用 4 區塊 glow 精修風格、受眾、平台與輸出規格。', tone:'cyan',
    });
  };

  const applySmartToNLM = state => {
    dispatch('nlm', 'nlm-state', { task: state.task, domain: state.domain, framework: state.framework, tone: state.tone, queryMode: state.queryMode, customDomain: state.customDomain, depth: state.depth, lang: state.lang }, {
      targetTab:'nlm', sourceTab:'smart', sourceLabel:'Smart 智慧製圖', title:'已從 Smart 建議進 NotebookLM 完整流程',
      body:'已從 Smart 預填 NotebookLM 前 4 步：task / domain / framework / tone。可直接到 Step 5 產生指令，或回前面修改。', tone:'cyan', prompt:state.prompt, prefilled:true,
    });
  };

  const sendStyleToAudit = text => {
    dispatch('audit', 'audit-text', { text, source: 'style' }, {
      targetTab:'audit', sourceTab:'style', sourceLabel:'風格實驗室', title:'來自風格實驗室的英文 prompt',
      body:'已帶入體檢 & 增強頁，請看 8 維度分數與可補強處。', tone:'amber',
    });
  };

  return (
    <ApiCtx.Provider value={{ key:apiKey, setKey:setApiKey }}>
      <div className="min-h-screen text-slate-200">
        <header className="sticky top-0 z-40 bg-slate-900/95 backdrop-blur border-b border-slate-700/50">
          <div className="max-w-5xl mx-auto px-4">
            {/* Logo + 標題 + API Key（同一行）*/}
            <div className="flex items-center gap-3 py-2.5">
              <div className="bg-gradient-to-br from-yellow-400 to-amber-500 p-1.5 rounded-lg flex items-center justify-center w-8 h-8 shrink-0">
                <span className="text-slate-900 font-black text-sm leading-none">◆</span>
              </div>
              <div className="flex-1 min-w-0">
                <h1 className="text-sm font-bold text-white tracking-wide leading-none">Forma Studio v2.0 實驗版</h1>
                <p className="text-xs text-slate-500 leading-none mt-0.5">AI 設計提示詞工作坊</p>
                <p className="text-xs text-amber-400/80 leading-none mt-1"><a href="./forma-studio.html" className="underline hover:text-amber-300">v1.1 穩定版仍可用 →</a></p>
              </div>
              {/* API Key 右上角 */}
              <ApiKeyInline openSettings={()=>setSettingsOpen(true)} />
            </div>
            {/* 頁籤列 */}
            <div className="flex border-t border-slate-800 overflow-x-auto">
              {tabs.map(t=>(
                <button key={t.id} tabIndex={0} onClick={()=>goTab(t.id)}
                  className={`px-4 py-2.5 text-sm font-semibold whitespace-nowrap transition-all ${tab===t.id?'tab-on':'tab-off'}`}>
                  {t.label}
                </button>
              ))}
              <button tabIndex={0} onClick={()=>setSettingsOpen(true)}
                className="ml-auto px-4 py-2.5 text-sm font-semibold whitespace-nowrap transition-all tab-off">
                ⚙️ 設定
              </button>
            </div>
          </div>
        </header>

        {tab==='smart'  && <SmartTab goTab={goTab} onSendAudit={sendPromptToAudit} onApplyToDesign={applySmartToDesign} onApplyToNLM={applySmartToNLM}/>}
        {tab==='nlm'    && <NLMTab landingNote={landingNote} clearLandingNote={clearLandingNote} goTab={goTab} pendingPayload={pendingPayload} consumePendingPayload={consumePendingPayload}/>}
        {tab==='design' && <DesignTab pendingPayload={pendingPayload} consumePendingPayload={consumePendingPayload} landingNote={landingNote} clearLandingNote={clearLandingNote} goTab={goTab}/>}
        {tab==='promptlab' && <PromptLabTab onApplyToDesign={applyPromptToDesign} goTab={goTab} landingNote={landingNote} clearLandingNote={clearLandingNote}/>}
        {tab==='audit'  && <AuditTab onApply={applyAuditToDesign} pendingPayload={pendingPayload} consumePendingPayload={consumePendingPayload} landingNote={landingNote} clearLandingNote={clearLandingNote} goTab={goTab}/>}
        {tab==='style'  && <StyleStudioTab onApply={applyStyleToDesign} onSendAudit={sendStyleToAudit}/>}
      </div>
      <SettingsPanel open={settingsOpen} onClose={()=>setSettingsOpen(false)}/>
    </ApiCtx.Provider>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
