<script id="forma-gallery" type="application/json">{"schema_version":1,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","base_url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references"},"sources":[{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","count":66},{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","count":50}],"categories":[{"slug":"ui-ux-mockups","category":"UI/UX Mockups","title_zh":"UI/UX 介面設計","industries":["product","design","marketing","legal","education","general"],"use_cases":["產品 mockup","提案展示","App 概念稿","Web 平台 demo"],"count":5,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-ui-ux-mockups.md"},"prompts":[{"id":"ui-ux-mockups-102","no":102,"title":"Mobile Budgeting App Mockup","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"Design a polished mobile finance app UI mockup for a fictional neobank called AURAE, shown on a 1290x2796 smartphone screen, front-facing, with a soft off-white background and subtle shadow. Use a calm palette of deep navy, mint green, warm gray, and white. Create a complete home screen with crisp typography, clean spacing, rounded cards, and precise icon alignment. Include a top header with the in-image text \"AURAE\", \"Good morning, Lina\", and \"Total balance $12,480.36\". Add three summary chips labeled \"Income +$4,200\", \"Spent -$1,830\", and \"Saved 32%\". Show a weekly spending bar chart labeled \"Mon Tue Wed Thu Fri Sat Sun\" and a recent transactions list with \"Metro Pass $18.50\", \"Green Bowl $14.20\", and \"Rent $1,240.00\". Include a bottom nav with \"Home\", \"Cards\", \"Budget\", and \"Profile\". Prioritize crisp UI hierarchy, realistic mobile app styling, sharp labels, and production-quality mockup presentation."},{"id":"ui-ux-mockups-103","no":103,"title":"Desktop Operations Dashboard","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"Create a high-end desktop SaaS analytics dashboard mockup for a fictional platform named HELIX OPS, displayed on a 16:10 monitor canvas at 1600x1000. Use a cool palette of slate, cobalt blue, teal, pale gray, and white, with subtle glass panels and tight grid alignment. The layout should include a left sidebar, top filter bar, KPI cards, line charts, data table, and alert panel. Use crisp typography and correct labels. Include in-image text: \"HELIX OPS\", \"Operations Overview\", \"Last 30 Days\", \"Uptime 99.982%\", \"Tickets 184\", \"Latency 42 ms\", and \"Conversion 6.4%\". Show a line chart labeled \"Apr 1\" through \"Apr 30\", a donut chart titled \"Traffic Sources\", and a table with columns \"Site\", \"Status\", \"Region\", and \"Load\". Add alert pills reading \"3 Critical\" and \"12 Warning\". Composition should feel realistic and presentation-ready, with clean hierarchy, precise spacing, balanced negative space, and ultra-sharp dashboard UI rendering."},{"id":"ui-ux-mockups-104","no":104,"title":"Design System Card Set","size":"square","pixel":"1024x1024","credit":"Curated","prompt":"Generate a clean design system overview board for a fictional product language called LUMEN UI, arranged as a square component gallery on a 2048x2048 canvas. Use a neutral palette of ivory, charcoal, muted blue, sage, and coral accents. The composition should be an orderly grid of cards showing buttons, input fields, badges, toggles, tabs, avatars, alerts, and pricing cards. Include crisp typography, even spacing, subtle shadows, and exact alignment as if exported from a professional design tool. Add labeled sections with the in-image text \"LUMEN UI\", \"Buttons\", \"Inputs\", \"Status\", \"Cards\", and \"Type Scale\". Include sample button labels \"Primary\", \"Secondary\", and \"Danger\"; badge labels \"Success\", \"Pending\", and \"Error\"; and typography specimens \"Display 48\", \"Heading 24\", and \"Body 16\". Ensure the board feels systematic, editorial, and highly legible, with clean hierarchy, correct labels, and polished component consistency suitable for a design systems gallery."},{"id":"ui-ux-mockups-105","no":105,"title":"Web3 Wallet Interface Concept","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"Design a premium mobile web3 wallet app mockup for a fictional wallet called NOVA VAULT on a 1179x2556 phone screen, centered on a dark graphite background with faint aurora gradients. Use a refined palette of black, electric cyan, emerald, violet-blue, and soft white. The app should feel modern but credible, with crisp typography, glassmorphism only where useful, and strong financial UI clarity. Include in-image text: \"NOVA VAULT\", \"Portfolio $48,920.14\", \"24h +3.82%\", \"Send\", \"Receive\", \"Swap\", and \"History\". Show token cards labeled \"SOLAR 18.42\", \"LATTICE 244.7\", and \"USDX 12,840.00\" with small sparkline charts. Add a security section reading \"Shield Level 96\" and a network selector labeled \"Mainnet\". Include a recent activity list with \"Swap SOLAR to USDX\", \"Received 240 LATTICE\", and \"Gas 0.0021\". Prioritize crisp labels, exact numbers, clean hierarchy, believable wallet UX, and polished gpt-image-2-friendly UI detail."},{"id":"ui-ux-mockups-106","no":106,"title":"Health Tracker App Mockup","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"Create a refined mobile health tracking app screen for a fictional wellness product named VITA LOOP, displayed on a tall smartphone with a bright editorial UI aesthetic. Use a palette of soft mint, deep forest green, cream, coral, and cool gray. Compose a daily overview screen with clean cards, circular progress rings, miniature charts, and a tidy bottom navigation. Include crisp in-image text: \"VITA LOOP\", \"Daily Summary\", \"Steps 8,420\", \"Sleep 7.6 h\", \"Heart Rate 64 bpm\", and \"Hydration 2.1 L\". Add three progress rings labeled \"Move 78%\", \"Recovery 84%\", and \"Focus 66%\". Show a weekly chart labeled \"Mon Tue Wed Thu Fri Sat Sun\" and two buttons reading \"Log Meal\" and \"Start Session\". Add a health insight card with the text \"Recovery improved 12% this week\". The result should feel production-ready, medically clean, carefully spaced, sharply rendered, and optimized for crisp typography and accurate labels."}]},{"slug":"typography-and-posters","category":"Typography & Posters","title_zh":"排版與海報","industries":["marketing","events","design","education","general"],"use_cases":["活動海報","展覽宣傳","課程招募","品牌主視覺"],"count":13,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-typography-and-posters.md"},"prompts":[{"id":"typography-and-posters-033","no":33,"title":"Chinese tea launch poster","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"Design a 3:4 vertical poster for a new Chinese trendy tea launch. Use a New Chinese visual style that feels light-luxury and restrained. The palette should be dark green, off-white, and gold, with rice-paper texture, elegant negative space, landscape accents, and modern layout design.\n\nMain subject:\na visually appealing cold-brew tea with tea leaves, citrus, ice cubes, and touches of gold foil.\n\nThe poster must accurately display the following exact Chinese copy:\n\"山川茶事\" / \"山柚观音\" / \"冷泡系列\" / \"新品上市\"\n\"一口清醒，半城入夏\" / \"限定尝鲜价\"\n\"中杯 16 元\" / \"大杯 19 元\"\n\"门店活动\" / \"第二杯半价\" / \"加 3 元升级轻乳版\" / \"每日前 100 名赠限定杯套\"\n\"推荐风味\" / \"观音茶底 / 西柚果香 / 轻乳云顶 / 冰感回甘\"\n\"活动时间 4月20日 至 5月10日\" / \"扫码点单\" / \"SHANCHUAN TEA\"\n\nFine print: \"图片仅供参考，请以门店实际售卖为准\"\n\nMaintain a clear promotional hierarchy while keeping the overall feeling sophisticated rather than cheap or overly e-commerce-like. Pay special attention to small text, numbers, prices, info modules, and Chinese typography aesthetics."},{"id":"typography-and-posters-034","no":34,"title":"1980s propaganda poster","size":"portrait","pixel":"1024x1536","credit":"Author: @akokoi1","prompt":"Generate a 1980s propaganda poster. Use the exact slogan \"热烈庆祝GPT-Image-2全量开放\". Include Sam Altman, Dario Amodei, and Elon Musk, and give Dario Amodei a red scarf."},{"id":"typography-and-posters-035","no":35,"title":"Saul-Bass-style thriller movie poster","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"A Saul-Bass-style minimalist thriller movie poster, 3:4 portrait. Off-white paper background with subtle vintage grain. Large flat-color cut-paper shapes, bold geometry, negative-space illusion.\n\nComposition: a single stylised human silhouette in crimson running across centre; the shadow warps into a knife blade pointing up into the title. Black ink-brush splatter across the lower third. A single yellow eye motif in the upper-left negative space.\n\nExact typography:\n- Title (large hand-lettered serif, black): \"THE LAST HEIR\"\n- Tagline (small caps sans-serif, dark red): \"EVERY FAMILY KEEPS A SECRET. HIS WILL BURY THEM ALL.\"\n- Bottom credit block: \"PRODUCERS JANE NORRIS  LEWIS HAHN    DIRECTED BY MAYA ALVAREZ    A CINERA RELEASE    IN CINEMAS OCTOBER 31\"\n\nPalette: cream, charcoal black, crimson red, mustard-yellow accent. Pure flat graphic design, no photo elements, no gradients, no 3D — in the lineage of Bass's \"Anatomy of a Murder\", \"Vertigo\", and \"The Man with the Golden Arm\"."},{"id":"typography-and-posters-036","no":36,"title":"Vogue-style fashion magazine cover","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"A high-fashion magazine cover, 3:4 portrait, Vogue Paris / British Vogue editorial aesthetic.\n\nSubject: a tall female model, medium-dark skin tone, mid-thirties, standing three-quarters to camera, direct piercing gaze. She wears a sculptural high-collared ivory wool coat over a silk slip dress in deep aubergine. Minimalist silver spiral earrings. Hair in a sleek low chignon with a single escaped strand. Makeup: matte bronze-warm, glossy plum lip.\n\nBackground: muted concrete-grey seamless paper backdrop, vertical shaft of cool daylight from upper left. Shallow depth of field.\n\nExact cover typography (all English, crisp, correctly spelled):\n- Masthead, huge uppercase serif, white: \"VOGUE\"\n- Date strip top-left, tiny caps: \"NOVEMBER 2026 · PARIS EDITION · €9.00\"\n- Main cover line, bold sans-serif centered: \"THE QUIET POWER ISSUE\"\n- Right-edge cover lines, stacked:\n   \"THE NEW MINIMALISTS — a 40-page portfolio\"\n   \"HOW AI TOOLS ARE REWRITING THE ATELIER\"\n   \"MARTIN MARGIELA'S UNREVEALED ARCHIVE\"\n   \"SKIN · INVESTMENT · WHERE THE MONEY GOES NEXT\"\n- Bottom-left barcode with catalog code \"VG1126\"\n\nLighting: classic fashion editorial — soft single-source key, subtle fill, deep shadow on one cheek, fine film grain."},{"id":"typography-and-posters-037","no":37,"title":"1950s Astounding Stories pulp cover","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"A vintage sci-fi pulp magazine cover from the 1950s, 3:4 portrait. Classic \"Astounding Science Fiction\" / \"Galaxy\" aesthetic — painted gouache illustration with pulp-yellow paper texture, screen-printing registration slightly off, pale browned paper tone around edges.\n\nCover illustration: a chrome-silver rocket ship descending toward an alien red-desert planet with two Saturn-like ringed moons in a violet sky. A lone astronaut in a bulbous 1950s-style glass-dome space helmet stands foreground-left in a crimson pressurised suit, holding a ray-gun, facing a many-tentacled translucent green creature emerging from a fissure.\n\nExact typography:\n- Masthead, huge yellow retro display serif arched across the top: \"ASTOUNDING STORIES\"\n- Volume banner, red, under masthead: \"VOL. XXXVII · NO. 5 · MARCH 1957 · 25¢\"\n- Featured story callout, bold red sans-serif bottom-left: \"THE MEN FROM RIGEL — a novelette by E. A. KLEIN\"\n\nArt direction: painted gouache with visible brush strokes, saturated pulp palette (canary yellow, orange, red, electric violet, chrome silver), hand-lettered headlines, slightly rough paper texture, faint foxing on corners."},{"id":"typography-and-posters-038","no":38,"title":"Boston Spring 2026 city poster","size":"portrait","pixel":"1024x1536","credit":"Author: @BubbleBrain","prompt":"A striking Spring 2026 city poster for Boston with an elegant celebratory mood and a bold contemporary design. On a clean off-white textured background with large areas of negative space, a miniature single sculler rows across the lower right corner of the image on a narrow ribbon of reflective water. The wake from the oar sweeps upward in a dynamic calligraphic curve, gradually transforming into the Charles River and then into a dreamlike hand-painted panorama of Boston. Inside this flowing river-shaped composition are iconic Boston elements: the Back Bay skyline, Beacon Hill brownstones, Acorn Street, Boston Public Garden, Swan Boats, Zakim Bridge, Fenway-inspired details, historic brick architecture, harbor ferries, and the city's waterfront atmosphere. Soft morning fog, golden spring light, subtle festive accents in crimson and gold, rich detail, layered depth, sophisticated city-poster aesthetics, fresh and refined, visually powerful but not overcrowded. Elegant typography in the lower left reads \"SPRING 2026\" with a vertical slogan \"BOSTON, A CITY OF RIVER, MEMORY, AND INVENTION\", text clear and beautifully composed, premium graphic design, 9:16"},{"id":"typography-and-posters-039","no":39,"title":"Epic silhouette worldbuilding poster","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Design a collector's-edition epic poster for an original fantasy theme called \"The Celestial Archive\". The outer silhouette is a graceful side profile of a lone archivist, and inside that silhouette a complete world naturally grows: observatories, floating stairways, bridges, ancient libraries, moons, towers, relics, and distant pilgrims. Make it feel like a narrative silhouette composition rather than a collage. Style: cinematic poster fused with dreamy watercolor illustration, quiet and majestic, sacred and nostalgic, with paper grain, soft mist, brush-edge texture, elegant negative space, and a discreet signature \"WHY\" integrated naturally as part of the layout."},{"id":"typography-and-posters-040","no":40,"title":"Dual-exposure narrative poster","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Create a high-aesthetic collector poster in a \"silhouette universe / dual-exposure narrative\" style for an original theme called \"Moonlit Dragon Court\". Choose the most symbolic outer contour yourself — not a bottle or hourglass, but a more resonant form like a mask, archway, wing, throne, face profile, or luminous gate. Inside and around that contour, let a complete theme world naturally unfold: palaces, bridges, moonlit water, dragon motifs, relics, banners, distant figures, and layered atmospheric depth. The image must feel like a premium novel/anime poster: elegant, mythic, poetic, not cluttered, not collage-like, with strong visual memory and restrained luxurious design."},{"id":"typography-and-posters-041","no":41,"title":"Journey to the West silhouette epic poster","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Create a collector-edition epic narrative poster for 《西游记》. Use a giant elegant side-profile silhouette as the outer contour, and let the interior grow into a complete Journey to the West world: Monkey King, monk, pig and sand monk, flaming mountain, heavenly palace, demons, magic staff, clouds, temples, mountains, relics, and symbolic motifs. Not a collage but a refined silhouette-filled narrative composition, blending cinematic poster design with dreamy watercolor illustration, soft atmospheric perspective, paper grain, restrained layout, large breathing space, poetic and legendary mood. Add a subtle refined signature mark “WHY” integrated into the poster design."},{"id":"typography-and-posters-042","no":42,"title":"Japanese pachinko rainbow flyer","size":"portrait","pixel":"1024x1536","credit":"Author: @midori_tatsuta","prompt":"パチンコ屋のギラギラチラシを3:4で作って。リアルで精密な今どきの可愛い日本人女性を1人配置。ギラギラで立体感のあるリッチな装飾のレインボーフォントなどを駆使し、とにかく豪華に。実在しない架空の新台の紹介をいくつか並べて。価格・特典・煽り文句・小さな注意書きまで入れて、日本の量販広告らしい情報量と熱量で仕上げて。"},{"id":"typography-and-posters-043","no":43,"title":"Spanish fantasy film mobile poster","size":"portrait","pixel":"1024x1536","credit":"Author: @palabraseca","prompt":"Haz un póster vertical 4:5 para una película fantástica inexistente llamada \"La Última Ciudad Sumergida\". Debe sentirse como un gran estreno cinematográfico: detallado, elegante, épico y pensado como wallpaper de móvil. Muestra a una heroína sola sobre un puente inundado mirando una ciudad luminosa bajo el mar. Usa tipografía dramática en español, créditos falsos creíbles, niebla dorada, luz azul verdosa, composición premium y acabado de cartel internacional de cine."},{"id":"typography-and-posters-044","no":44,"title":"Chongqing rainy-night city promo poster","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"做一张 3:4 城市宣传海报，主题是“山城雨夜·重庆”。整体像高端城市文旅 campaign poster，不要廉价旅行社风格。画面中心是层叠山城建筑、轻轨穿楼、湿润街道、霓虹倒影、江边雾气和夜色中的坡道。用现代中文排版，加入少量准确标题与副标题：\"山城雨夜\" / \"CHONGQING\" / \"8D 城市 / 江雾 / 火锅 / 轻轨 / 夜景\"。信息密度适中，留白克制，色彩以深蓝、暖橙、湿润霓虹红为主，像一本设计年鉴里的城市品牌海报。"},{"id":"typography-and-posters-045","no":45,"title":"Athlete journey poster: Aya Navarro","size":"portrait","pixel":"1024x1536","credit":"Author: @aleenaamiir","prompt":"Cinematic portrait poster of fictional athlete Aya Navarro showing her full journey from local school courts to world-stage champion, bold editorial typography listing milestone years, medals, best performances, dramatic split-era composition, premium sports documentary design, mobile-poster format, high text clarity."}]},{"slug":"infographics-and-field-guides","category":"Infographics & Field Guides","title_zh":"資訊圖表與圖鑑","industries":["education","legal","accounting","research","general"],"use_cases":["流程圖","年報視覺","教材插圖","研究摘要圖"],"count":8,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-infographics-and-field-guides.md"},"prompts":[{"id":"infographics-and-field-guides-067","no":67,"title":"Song Dynasty social-media feed","size":"portrait","pixel":"1024x1536","credit":"Author: @Panda20230902","prompt":"\"Song Dynasty People's Moments\"/\"SONG DYNASTY SOCIAL MEDIA FEED\", Ancient and modern time-travel humor fusion interface design style, The image simulates a mobile phone social media interface, but the content is entirely Song Dynasty scenes, The avatar is a portrait of a Song Dynasty literati, Username \"Su Dongpo SuShi_Official\", Post content \"Just arrived in Huangzhou, demoted but feeling okay. Made Dongpo pork myself today, tastes amazing, recipe attached:\", The attached image is a close-up of Dongpo pork in Gongbi painting style, Likes list \"Huang Tingjian, Qin Guan, Fo Yin etc. 126 people\", Comments section \"Wang Anshi: Hehe\" \"Sima Guang: Still the same taste\", Interface elements such as the like icon are replaced with Song Dynasty patterns, The status bar shows \"Great Song Mobile 5G\" and \"Third Year of Yuanfeng\", The color scheme is mobile phone dark mode paired with elegant Song Dynasty tones, A masterpiece of fun collision between history and social media"},{"id":"infographics-and-field-guides-068","no":68,"title":"Museum catalog disassembly infographic (唐代襦裙)","size":"portrait","pixel":"1024x1536","credit":"Author: @MrLarus","prompt":"Please automatically generate a \"museum catalog-style Chinese disassembly infographic\" based on the [Subject].\n\nThe entire image is required to combine a realistic main visual, structural disassembly, Chinese annotations, material descriptions, pattern meanings, color meanings, and core feature summaries. You need to automatically determine the most appropriate main subject, clothing system, artifact structure, era style, key components, material craftsmanship, color scheme, and layout structure based on the [Subject], and the user does not need to provide any other information.\n\nThe overall style should be: national museum exhibition boards, historical clothing catalogs, and cultural/museum thematic infographics, rather than ordinary posters, ancient-style portraits, e-commerce detail pages, or anime illustrations. The background uses paper textures such as off-white, silk white, and light tea color, making the overall look premium, restrained, professional, and collectible.\n\nThe layout is fixed as:\n- Top: Chinese main title + subtitle + introduction\n- Left: Structural disassembly area, with Chinese lead lines annotating key components, accompanied by close-up details\n- Upper right: Material / craftsmanship / texture area, displaying real texture samples with descriptions\n- Middle right: Pattern / color / meaning area, displaying the main color palette, pattern samples, and cultural explanations\n- Bottom: Dressing order / composition flowchart + core feature summary\n\nIf the subject is suitable for character display, use a full-body standing posture of a real person as the central subject; if it is more suitable for artifacts or single structures, change it to a central subject disassembly diagram, but the overall form remains a complete Chinese infographic. All text must be in Simplified Chinese, clear, neat, and readable, without garbled characters, typos, English, or pinyin.\n\nAvoid: poster feel, studio portrait feel, e-commerce feel, anime feel, cosplay feel, random annotations, incorrect structures, blurry text, fake materials, excessive decoration."},{"id":"infographics-and-field-guides-069","no":69,"title":"Encyclopedia field guide (Giant Panda)","size":"portrait","pixel":"1024x1536","credit":"Author: @MrLarus","prompt":"Generate a high-quality vertical encyclopedia-style infographic for [topic].\n\nThis should not be a normal poster or a simple illustration. It should feel like a modular educational infographic that combines the clarity of a field guide, the structure of an encyclopedia page, the polish of a lifestyle knowledge card, and the shareability of a strong social-media explainer.\n\nThe image should include:\n- a clear and appealing main visual of the topic\n- several enlarged detail callouts\n- multiple rounded modular information sections\n- strong title hierarchy and highlighted key labels\n- concise but information-rich educational content\n- visual scoring, quick takeaways, or a Top 5 module\n\nAdapt the content sections automatically based on the topic. Useful categories include: basic profile, classification, appearance, habits or ecology, formation mechanism or structure, growth or usage conditions, care or maintenance advice, risks and cautions, suitable users or use cases, pros and cons, and a quick scorecard.\n\nVisual requirements: use a clean light background, soft colors, subtle shadows, refined small icons, rounded information cards, and neat layout. The information density should be high but not crowded, and the final image should feel publishable, collectible, and repeatable as a knowledge-card format rather than an advertisement.\n\nDo not make it look like a commercial promo poster. Emphasize knowledge organization, modular information, and a field-guide presentation."},{"id":"infographics-and-field-guides-070","no":70,"title":"Weekend Seoul travel guide poster","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Generate a polished one-page Chinese travel guide poster for a fast weekend trip from Nanjing to Seoul in May. Use LARGE highly legible Chinese text, short phrases only, and no paragraph blocks. Focus on shopping, skincare, and a stylish Seongsu-dong route. Layout: big title, 4 modules only (行程 / 区域推荐 / 购物清单 / 美妆护肤), each with 2 to 4 short bullet points, plus a small cute route map with icons. Clean editorial infographic style, soft pastel colors, neat spacing, high readability, modern Xiaohongshu travel card aesthetic. Avoid tiny text, avoid dense explanations, avoid garbled characters."},{"id":"infographics-and-field-guides-071","no":71,"title":"Modular encyclopedia infographic card","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Generate a high-quality vertical science encyclopedia card about \"雪豹 Snow Leopard\". It should feel like a collectible modular knowledge infographic rather than a normal poster. Include one beautiful hero illustration, several zoomed-in detail callouts, rounded information modules, clear title hierarchy, compact encyclopedia content, rating cards, and a Top 5 facts module. Suggested sections: basic profile, habitat, appearance, hunting behavior, conservation risks, climate adaptation, suitable environment, and quick scorecard. Visual style: clean light background, soft palette, subtle shadows, refined icons, rounded info boxes, dense but readable information, polished editorial layout, high collection value."},{"id":"infographics-and-field-guides-072","no":72,"title":"Xiaohongshu cooking tutorial card","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Create a Xiaohongshu-style viral cooking tutorial image in a 3:4 vertical layout for homemade scallion oil noodles. Cozy home-cooking vibe, warm inviting lifestyle aesthetic, 4 to 6 step grid layout, clean spacing, realistic food photography, soft natural lighting, slight film tone, warm color grading, visible oil sheen, steam, sauce texture, and hands interacting with the food. Add small Chinese annotations such as 切葱, 熬油, 拌面, 出锅. Avoid overcrowding or excessive text."},{"id":"infographics-and-field-guides-073","no":73,"title":"Camera styles reference board for iPhone photographers","size":"landscape","pixel":"1536x1024","credit":"Author: @Vtrivedy10","prompt":"Make me an image in 35 mm film style of a diagram showing the knowledge of camera styles, presets, and what to know about them as an aspiring iPhone photographer that wants to pursue their passion. Build it as a rich multi-panel reference board with labeled sections for film looks, digital presets, portrait approaches, street photography styles, color temperature, grain, contrast, flash, framing, and common mistakes. Each camera and preset style should appear in its actual style instead of being rendered uniformly in one style. Make it visually dense, highly educational, beautifully designed, and easy to scan."},{"id":"infographics-and-field-guides-074","no":74,"title":"Chinese endangered-animal infographic","size":"portrait","pixel":"1024x1536","credit":"Author: @billtheinvestor","prompt":"Create a visually rich infographic in Chinese about an endangered animal. Start by finding one online, research its habitat, diet, and unique traits. Present information through annotated visuals and structured callouts, not generic sections. Style it like a bold graphic illustration: a detailed, photorealistic central animal as the focal point, supported by diagrams, callouts, and concise text elements. Use clean backgrounds and a mix of photorealism with strong graphic elements (shapes, icons, color blocking) in a layered composition. Make it dense, tactile, and professionally authored."}]},{"slug":"brand-systems-and-identity","category":"Brand Systems & Identity","title_zh":"品牌系統與識別","industries":["design","marketing","general"],"use_cases":["品牌指引展示","Logo 系統","識別頁"],"count":3,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-brand-systems-and-identity.md"},"prompts":[{"id":"brand-systems-and-identity-060","no":60,"title":"Moss Radio brand identity showcase board","size":"square","pixel":"1024x1024","credit":"Author: @LexnLin","prompt":"Create a square high-end brand identity showcase board for a fictional brand called \"Moss Radio\". The brand should feel analog, cultured, warm, tactile, and design-forward. It operates in independent audio hardware and café-retail and should appeal to creative professionals and music obsessives. The overall mood should be nostalgic but modern. Design a polished modular grid of multiple tiles, each showing a different application of one cohesive visual identity system. Include logo explorations, wordmarks, app icon variations, editorial posters, product cards, landing page fragments, packaging concepts, typography specimens, interface snippets, color palette presentations, sticker systems, patterns, branded mockups, and small motion-inspired compositions. Use Swiss-inspired typography, rounded industrial shapes, and a moss green / parchment / charcoal / copper palette. Dense but elegant layout, sharp alignment, strong hierarchy, premium case-study presentation."},{"id":"brand-systems-and-identity-061","no":61,"title":"PS1 nostalgia reboot brand kit","size":"square","pixel":"1024x1024","credit":"Author: @den_turbin","prompt":"Create a clean brand kit presented as one square modular board for a fictional revival of the PlayStation One era called \"PS1 1998 Reboot\". The identity should merge Japanese editorial design, Y2K nostalgia, acid green accents, VHS texture, silver plastics, disc-menu UI motifs, retail stickers, controller packaging, startup-screen typography, and memory-card iconography. Show multiple coordinated tiles including posters, packaging, interface snippets, collectible cards, typography studies, icons, and branded mockups. Keep it polished, cohesive, art-directed, and emotionally nostalgic, like a real top-tier design studio case study rather than generic merch."},{"id":"brand-systems-and-identity-062","no":62,"title":"Playful brand kit: Mochi Metro","size":"square","pixel":"1024x1024","credit":"Author: @aleenaamiir","prompt":"Playful brand kit for \"Mochi Metro\", bold colors, fun typography, modern layout, modular square board with logo studies, packaging snippets, posters, app icons, stickers, UI fragments, and a cheerful Tokyo-snack visual system. Crisp alignment, dense but clean, highly polished design presentation."}]},{"slug":"edit-endpoint-showcase","category":"Edit Endpoint Showcase","title_zh":"圖像編修示範","industries":["design","marketing","general"],"use_cases":["既有海報換場景","多參考圖合成","局部 inpaint"],"count":2,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-edit-endpoint-showcase.md"},"prompts":[{"id":"edit-endpoint-showcase-100","no":100,"title":"Chess board → winter evening (edit via `/v1/images/edits`) 🆕","size":"landscape","pixel":"1536x1024","credit":"Author: OpenAI","prompt":"Make it a winter evening with heavy snowfall, snow dusted on the board and pieces, breath vapor in the air, cold blue-grey lighting, chess position still clearly readable. Preserve the original chess-board composition and landscape aspect ratio exactly; keep the board and pieces aligned and readable."},{"id":"edit-endpoint-showcase-101","no":101,"title":"Tea poster → metro lightbox mockup","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"Transform the provided tea poster into a realistic metro-station lightbox mockup while preserving the poster artwork and Chinese typography as much as possible. Show the poster behind glossy glass in a vertical illuminated advertising frame on a clean subway platform wall. Add subtle reflections, brushed metal frame, floor tiles, soft overhead transit lighting, and a few blurred commuters in the distance. Keep the poster straight, legible, and dominant; do not redesign the poster, do not change its main text, and do not add fake brand logos."}]},{"slug":"photography","category":"Photography","title_zh":"商業攝影","industries":["marketing","real_estate","hospitality","retail","general"],"use_cases":["產品攝影","空間氛圍","場景情境"],"count":4,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-photography.md"},"prompts":[{"id":"photography-063","no":63,"title":"RAW iPhone — 42nd Street subway","size":"landscape","pixel":"1536x1024","credit":"Author: @WolfRiccardo","prompt":"Create a completely RAW quality, unprocessed, unedited image with full iPhone camera quality. A subway station in USA, a momentary blur. The subway is in motion. In front of the subway, there is an elderly woman and man."},{"id":"photography-064","no":64,"title":"Handwritten notebook flatlay","size":"landscape","pixel":"1536x1024","credit":"Author: @patrickassale","prompt":"Amateur photo of an open notebook lying flat, filled with handwritten notes in black ballpoint pen. The handwriting is casual and slightly messy, like personal notes, natural imperfections, crossed out words, underlined headings. Shot from slightly above, natural daylight from a window, no flash. Casual desk setting, shot on iPhone"},{"id":"photography-065","no":65,"title":"Chess board mid-tournament game","size":"landscape","pixel":"1536x1024","credit":"Author: @EddGorenstein","prompt":"Generate a photorealistic photo of a chess board during the middle of a serious tournament game. Top-down three-quarter view, shallow depth of field. All pieces clearly distinguishable and correctly shaped: pawns, rooks, knights (with horse-head silhouette), bishops (mitre tops), queens, kings (with cross finials). The position is mid-game: several pieces already captured and set aside to the right of the board, some pawns advanced, pieces clustered around the central files d4-e5-f4.\n\nMaterials: polished wooden staunton-style pieces — dark side in rosewood, light side in maple. Board made of inlaid maple and walnut squares. A digital chess clock sits to the left showing \"00:14:28 / 00:08:47\". Soft overhead tournament lighting, blurred tournament-hall background. All pieces accurate, no mutants, no extra sets."},{"id":"photography-066","no":66,"title":"360° equirectangular jungle panorama","size":"wide","pixel":"2048x1152","credit":"Author: @AIimagined","prompt":"360 equirectangular panorama of a dense prehistoric jungle scene. Cinematic detail. Strict 2:1 aspect ratio (e.g. 4096×2048). No distortion at the seams — the left and right edges must wrap seamlessly.\n\nScene: towering fern-covered trees, shafts of golden sunlight piercing the canopy, a slow river winding through the centre foreground, mist rising off the water. Scattered dinosaurs of varied species — a grazing Brachiosaurus neck visible among distant tree canopy, two small Gallimimus drinking at the river's edge, a Triceratops in the background underbrush. Tropical birds in flight, butterflies, dragonflies over the water.\n\nLighting: late-afternoon golden hour, warm directional backlight through the canopy. High dynamic range, slight atmospheric haze. Equirectangular projection suitable for spherical / 360 viewers."}]},{"slug":"product-and-food","category":"Product & Food","title_zh":"產品與食物","industries":["marketing","retail","hospitality","general"],"use_cases":["商品包裝","餐飲菜單","電商素材"],"count":4,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-product-and-food.md"},"prompts":[{"id":"product-and-food-056","no":56,"title":"3D product box from dieline","size":"portrait","pixel":"1024x1536","credit":"Author: @Salmaaboukarr","prompt":"Assemble the dieline into a flawless 3D box with accurate panels, clean folds, undistorted type, and artwork preserved exactly. Shoot it upright at a refined three-quarter angle in a minimal premium studio setting with a soft neutral background, diffused light, subtle shadows, no props, true colours, matte paperboard texture, and realistic editorial detail. The box front reads \"AURAE / COLD-BREW MATCHA / 12 fl oz\" in clean sans-serif. Side panel shows small ingredient list in 8pt type, nutrition-facts-style block. Clean, editorial, award-winning packshot aesthetic."},{"id":"product-and-food-057","no":57,"title":"Chocolate wafer product render (JSON-style)","size":"portrait","pixel":"1024x1536","credit":"Author: @mehvishs25","prompt":"/* PRODUCT_RENDER_CONFIG: Chocolate Wafer Hazelnut Edition\n   VERSION: 2.0.1\n   AESTHETIC: Premium Commercial Food Photography */\n\n{\n  \"ENVIRONMENT\": {\n    \"Background\": \"Gradient(Dark_Warm_Brown)\",\n    \"Atmospheric_FX\": [\"Floating_Particles\", \"Depth_Blur\", \"Cinematic_Bokeh\"],\n    \"Lighting\": { \"Type\": \"Directional_Studio_Warmer\", \"Highlights\": \"Specular_Glossy_Reflections\", \"Shadow_Softness\": \"High\" }\n  },\n  \"CORE_ASSETS\": {\n    \"Primary_Subject\": \"Wafer_Rolls\",\n    \"Physics\": \"Zero_Gravity_Diagonal_X_Composition\",\n    \"Material_Properties\": {\n      \"Outer\": \"Milk_Chocolate_Coating\",\n      \"Surface_Texture\": \"Irregular_Nut_Clusters_Embedded\",\n      \"Interior_Cross_Section\": { \"Structure\": \"Crispy_Hollow_Wafer\", \"Core\": \"Silky_Chocolate_Cream_Filling\" }\n    }\n  },\n  \"PARTICLE_SYSTEMS\": [\n    { \"Object\": \"Chocolate_Blocks\", \"Detail\": \"Rectangular_Embossed_Letter_B\", \"State\": \"Floating\" },\n    { \"Object\": \"Hazelnuts\", \"State\": \"Halved_and_Fragmented\", \"Distribution\": \"Random_Orbit\" }\n  ],\n  \"FLUID_DYNAMICS\": { \"Element\": \"Chocolate_Splash\", \"Behavior\": \"Dynamic_Backdrop_Flow\", \"Viscosity\": \"Thick_Glossy\" },\n  \"RENDER_OUTPUT\": { \"Resolution\": \"8K_UHD\", \"Aspect_Ratio\": \"3:4\", \"Quality_Flags\": [\"Hyper_Realistic\", \"Sharp_Foreground\", \"Indulgent_Mood\"] }\n}"},{"id":"product-and-food-058","no":58,"title":"Salad-explosion food photography (JSON-style)","size":"portrait","pixel":"1024x1536","credit":"Author: @ChillaiKalan__","prompt":"{\n  \"global_settings\": {\n    \"resolution\": \"8K ultra high definition\",\n    \"aspect_ratio\": \"2:3 vertical\",\n    \"style\": \"hyper-realistic food photography\",\n    \"clarity\": \"extreme sharpness, micro-texture visibility\",\n    \"motion\": \"frozen action with suspended ingredients\",\n    \"lighting_quality\": \"studio-grade, high-contrast, cinematic\"\n  },\n  \"scene_description\": \"A dynamic salad explosion emerging from a matte black bowl placed on a round wooden surface. Ingredients are mid-air, scattered upward and outward, each ingredient lit by a directional key light that highlights surface moisture.\",\n  \"ingredients_visible\": [\n    \"green lettuce leaves\", \"cherry tomatoes (whole and sliced)\", \"cucumber slices arranged in a curved stack\",\n    \"black olives\", \"white cheese cubes\", \"orange citrus slice\", \"small broccoli florets\",\n    \"fresh green basil leaves\", \"a drizzle of olive oil caught mid-fall\"\n  ],\n  \"motion_details\": {\n    \"ingredients\": \"caught mid-arc, rotating slightly, some lightly blurred to convey motion\",\n    \"particles\": \"tiny droplets of olive oil and water beads floating between ingredients\",\n    \"bowl\": \"perfectly still, matte black, absorbing highlights\"\n  },\n  \"environment\": { \"background\": \"softly graded off-white to warm beige\", \"surface\": \"circular cut of raw oak wood\" },\n  \"render_flags\": [\"food photography award-winning\", \"no CGI tell\", \"editorial cookbook cover feel\"]\n}"},{"id":"product-and-food-059","no":59,"title":"Universal commercial poster template","size":"portrait","pixel":"1024x1536","credit":"Author: Unknown","prompt":"Design a high-end commercial poster for a product called \"Aurora Oolong Cold Brew\". Minimalist style, clean frame, centered hero bottle and tea glass, soft studio lighting, realistic material textures, elegant condensation details, generous negative space, premium brand visual language, cinematic light and shadow, refined packaging typography, and ultra-detailed finish. Make it feel like a luxury beverage campaign that could run in a subway lightbox or fashion magazine."}]},{"slug":"data-visualization","category":"Data Visualization","title_zh":"資料視覺化","industries":["accounting","research","education","product","general"],"use_cases":["年報圖表","研究數據","儀表板示意"],"count":5,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-data-visualization.md"},"prompts":[{"id":"data-visualization-107","no":107,"title":"Small Multiples Climate Grid","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Produce a clean editorial data visualization poster showing a 4x3 small-multiples grid of monthly climate charts for 12 fictional cities. Use a white background, generous margins, and a restrained palette of navy, rust, sky blue, olive, and charcoal. Each mini-panel should contain a temperature line and precipitation bars with consistent axes and ultra-legible labels. Include a title block with the in-image text \"Annual Climate Profiles\" and subtitle \"12 Cities, 2025\". Label panels \"Northport\", \"Solmere\", \"Aster Bay\", \"Ridgefall\", \"Halcyon\", \"Verdin\", \"Glass Harbor\", \"Red Mesa\", \"Moonfield\", \"Lake Arden\", \"Cinder Point\", and \"Juniper\". Use month labels \"J F M A M J J A S O N D\" and axis labels \"Temp °C\" and \"Rain mm\". Add numeric legend values \"0\", \"10\", \"20\", \"30\", and \"100\". Keep the composition highly structured, scientifically clear, and visually elegant, with crisp typography, aligned scales, and publication-grade chart rendering."},{"id":"data-visualization-108","no":108,"title":"Network Graph Collaboration Map","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"Generate a sophisticated network graph visualization on a dark charcoal canvas showing collaborations across a fictional research consortium called ORBIT GRID. Use glowing node colors in teal, amber, coral, pale blue, and white, with fine connecting lines and clean labels. The composition should be balanced, readable, and intentionally designed rather than random. Include a title in crisp text reading \"ORBIT GRID Collaboration Network\" and a legend with \"Institute\", \"Lab\", \"Project\", and \"Advisory\". Show approximately 36 nodes, with larger hubs labeled \"Helix Center\", \"Nova Lab\", \"Aster Institute\", \"Cinder Bio\", and \"Polar Systems\". Add edge labels sparingly, such as \"shared data\", \"joint grant\", and \"coauthor\". Include a right-side stats card reading \"Nodes 36\", \"Edges 92\", and \"Density 0.146\". Emphasize clean hierarchy, accurate node-label placement, anti-overlap spacing, subtle depth, and crisp typography suited for a polished technical visualization generated by gpt-image-2."},{"id":"data-visualization-109","no":109,"title":"Chord Diagram of Energy Flows","size":"square","pixel":"1024x1024","credit":"Curated","prompt":"Create a publication-quality chord diagram visualizing fictional regional energy flows in 2025. Use a bright ivory background with a centered circular composition and a harmonious palette of cobalt, teal, ochre, coral, plum, and graphite. The diagram should feel mathematically precise, with clean arcs, semi-transparent ribbons, and highly legible labels. Add a title block with the in-image text \"Regional Energy Exchange\" and subtitle \"TWh, 2025\". Label outer segments \"North\", \"South\", \"East\", \"West\", \"Coastal\", and \"Grid Reserve\". Include a small legend reading \"Hydro\", \"Solar\", \"Wind\", and \"Storage\". Place tiny numeric ticks around the ring at \"0\", \"50\", \"100\", and \"150\". Use ribbon thickness to imply volume, but keep the composition readable and elegant. Prioritize crisp labels, clear hierarchy, accurate geometry, balanced white space, and a refined data-journalism aesthetic rather than generic infographic styling."},{"id":"data-visualization-110","no":110,"title":"Treemap Budget Allocation","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"Design a modern treemap infographic showing a fictional company budget allocation for LUMEN BIO in fiscal year 2026. Use a light neutral background and a controlled palette of forest green, desaturated blue, amber, terracotta, lavender-gray, and charcoal outlines. The composition should be a clean rectangular treemap with strong visual grouping and crisp typography. Include a header with the in-image text \"LUMEN BIO Budget Allocation\" and \"FY 2026\". Major blocks should be labeled \"R&D 38%\", \"Manufacturing 22%\", \"Clinical 14%\", \"Operations 10%\", \"Marketing 7%\", \"IT 5%\", and \"Legal 4%\". Within some blocks, add smaller labels like \"Prototypes\", \"Reagents\", \"QA\", \"Cloud\", and \"Field Trials\". Include a compact side legend reading \"Total Budget $84.0M\". Ensure the chart has precise edges, balanced annotation density, clean hierarchy, and sharp text rendering suitable for a technical gallery prompt."},{"id":"data-visualization-111","no":111,"title":"Geographic Choropleth Yield Map","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Produce a polished geographic choropleth map infographic of a fictional agricultural region called the Solterra Basin, showing harvest yield by district. Use a minimalist cartographic style on an off-white background with muted terrain hints and a sequential palette from pale sand to deep green. The map should include 14 clearly separated districts with clean borders, crisp labels, and a right-side legend. Include in-image text: \"Solterra Basin Harvest Yield\", \"2025\", and legend title \"tons / hectare\". Label districts with names such as \"North Vale\", \"Riverbend\", \"Copper Plain\", \"East Orchard\", and \"Cinder Ridge\". Include legend values \"1.2\", \"2.4\", \"3.6\", \"4.8\", and \"6.0\". Add a compact annotation box reading \"Highest yield: East Orchard 5.8\" and \"Lowest yield: Dry Steppe 1.4\". Prioritize clean typography, accurate map-like geometry, balanced composition, subtle cartographic detail, and publication-grade infographic clarity."}]},{"slug":"architecture-and-interior","category":"Architecture & Interior","title_zh":"建築與室內","industries":["real_estate","design","hospitality","general"],"use_cases":["建案概念","空間提案","氛圍渲染"],"count":5,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-architecture-and-interior.md"},"prompts":[{"id":"architecture-and-interior-117","no":117,"title":"Japanese Minimalist Living Room","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"Render a serene Japanese minimalist living room interior in photorealistic architectural visualization style, viewed from eye level with a 28 mm lens feel. The space should feature light oak flooring, shoji-inspired sliding panels, low modular seating, a recessed tokonoma niche, linen textures, and soft morning light entering from the left. Use a restrained palette of warm beige, pale oak, charcoal, muted moss green, and rice-paper white. Include subtle in-image text on a small framed floor plan board that reads \"Room 6.4 m x 4.8 m\" and \"AURAE House\". Add a low tea table, one ceramic vase, a bonsai-like plant, and indirect cove lighting at 3000 K. Composition should be calm and balanced with strong negative space, realistic shadows, accurate material behavior, and magazine-quality interior rendering. Prioritize photorealism, architectural detail, crisp edges, and tasteful minimalism rather than stylized fantasy."},{"id":"architecture-and-interior-118","no":118,"title":"Brutalist Concrete Museum Atrium","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Create a photorealistic interior render of a monumental brutalist museum atrium with exposed board-formed concrete, dramatic skylights, long ramps, and massive geometric voids. Viewpoint is slightly low and wide, emphasizing vertical scale and shadow. Use a palette of cool gray concrete, black steel, muted sandstone, pale daylight, and a few rust-colored wayfinding accents. Include sparse signage with crisp in-image text: \"Gallery A\", \"Level 02\", and \"Atrium 18.0 m\". Add a few small human figures for scale, but keep the architecture dominant. The space should include suspended walkways, a central sculpture plinth, and reflected light from polished concrete floors. Composition must feel cinematic yet architecturally precise, with realistic material textures, accurate lighting, controlled contrast, and gallery-quality rendering. Prioritize believable spatial depth, clean geometry, subtle atmospheric perspective, and sharp signage."},{"id":"architecture-and-interior-119","no":119,"title":"Mid-Century Modern Office","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"Render a sophisticated mid-century modern creative office in photorealistic interior style, with walnut millwork, brass accents, olive upholstery, terrazzo flooring, smoked glass partitions, and large windows casting late-afternoon light. Use a rich palette of walnut brown, olive green, cream, brass gold, and muted terracotta. The composition should show a central executive desk, built-in shelving, a lounge corner, and a wall-mounted planning board. On the board, include subtle in-image text \"Studio North\", \"Q3 Review\", and \"14:30\". Add realistic accessories like drafting tools, books, ceramic lamps, and a record player, but keep the scene curated and uncluttered. Camera angle should feel editorial, around 32 mm, with balanced perspective lines and realistic depth of field. Prioritize tactile materials, believable lighting, clean geometry, and polished architectural-visualization quality with crisp details and intentional composition."},{"id":"architecture-and-interior-120","no":120,"title":"Biophilic Biotech Lab","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Generate a high-end photorealistic render of a future-facing biotech laboratory that integrates biophilic design. Show a bright open lab with glass partitions, living moss walls, hanging plants, pale wood details, white composite worktops, and advanced research equipment. Use a fresh palette of white, sage green, pale oak, stainless steel, and clear cyan monitor accents. Include precise architectural lighting at 4200 K, skylight diffusion, and clean reflections. Add subtle wall graphics with crisp in-image text \"HELIX BIO LAB 03\", \"Clean Zone\", and \"22 C\". The scene should include lab benches, microscopes, sample storage towers, and collaborative seating, arranged with strong spatial clarity. Composition must feel aspirational but credible, with realistic equipment proportions, hygienic surfaces, controlled clutter, and premium visualization quality. Emphasize photorealism, accurate material rendering, clean hierarchy, and an elegant fusion of nature and scientific workspace design."},{"id":"architecture-and-interior-121","no":121,"title":"Gothic Cathedral Interior","size":"tall","pixel":"2160x3840","credit":"Curated","prompt":"Render a majestic Gothic cathedral interior in photorealistic architectural style, viewed down the central nave with towering ribbed vaults, pointed arches, intricate tracery, and colored light from stained glass windows. Use a palette of cool stone gray, deep burgundy, sapphire blue, candle gold, and dusty ambient light. Include realistic worn limestone textures, carved choir stalls, a patterned stone floor, and a distant altar. Add a discreet informational plaque near the foreground with the in-image text \"Nave Height 28.5 m\" and \"Westminster Hall of Light\". The composition should emphasize verticality, symmetry, and sacred atmosphere while remaining architecturally believable. Lighting should mix soft daylight shafts and warm candlelight, with subtle volumetric dust. Prioritize accurate Gothic detailing, strong perspective, material realism, and crisp small text, producing a museum-grade architectural render rather than a fantasy scene."}]},{"slug":"technical-illustration","category":"Technical Illustration","title_zh":"技術插圖","industries":["engineering","manufacturing","education","general"],"use_cases":["產品爆炸圖","原理示意","操作手冊插畫"],"count":5,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-technical-illustration.md"},"prompts":[{"id":"technical-illustration-112","no":112,"title":"Mechanical Watch Exploded View","size":"square","pixel":"1024x1024","credit":"Curated","prompt":"Create a premium technical exploded-view illustration of a fictional mechanical wristwatch called the Meridian 8, centered on a dark slate background with fine blueprint grid accents. Show the watch components separated vertically with precise spacing: sapphire crystal, dial, hands, chapter ring, movement plates, escapement, balance wheel, mainspring barrel, case, crown, and leather strap sections. Use realistic brushed steel, brass, ruby jewel accents, and deep navy dial details. Add crisp callouts and labels with the in-image text \"Meridian 8\", \"Exploded Assembly\", \"42 mm Case\", \"25 Jewels\", and \"Power Reserve 72 h\". Include numbered callouts \"01\" through \"10\" with short labels like \"Balance Wheel\", \"Mainspring Barrel\", and \"Sapphire Crystal\". The result should be highly detailed, technically believable, sharply rendered, and suitable for an industrial design plate with clean hierarchy, exact labeling, and refined material realism."},{"id":"technical-illustration-113","no":113,"title":"Rocket Cutaway Diagram","size":"tall","pixel":"2160x3840","credit":"Curated","prompt":"Generate a highly detailed vertical cutaway illustration of a fictional two-stage launch vehicle named Aster-9 on a clean white technical background. Show the full rocket from nose cone to engines, sliced to reveal internal tanks, avionics, payload fairing, interstage, turbopumps, and thrust structure. Use a restrained palette of white, gunmetal, orange, pale blue, and safety red accents. Add precise leader lines and crisp labels. Include in-image text: \"ASTER-9\", \"Payload 8,400 kg\", \"Height 62.4 m\", \"Stage 1 RP-1 / LOX\", and \"Stage 2 Methalox\". Label internal parts such as \"Payload Bay\", \"Guidance Computer\", \"LOX Tank\", \"Fuel Tank\", \"Helium COPV\", and \"Engine Cluster x9\". Add a small scale marker with \"0 m\", \"20 m\", \"40 m\", and \"60 m\". Prioritize accurate engineering-diagram composition, clean typography, believable hardware detail, and razor-sharp annotations optimized for gpt-image-2."},{"id":"technical-illustration-114","no":114,"title":"Mechanical Keyboard Exploded Assembly","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Design a crisp exploded-view product illustration of a custom mechanical keyboard named LUMEN K65, shown in three-quarter perspective on a pale gray background with subtle shadow. Separate the layers clearly: keycaps, switches, plate, PCB, foam, gasket mounts, case top, battery module, rotary knob, and case bottom. Use anodized silver, matte black, translucent smoke keycaps, and small teal accent parts. Add clean technical callouts and in-image text reading \"LUMEN K65\", \"Exploded Assembly\", \"65% Layout\", \"Hot-Swap PCB\", and \"3,200 mAh\". Include labels for \"PBT Keycaps\", \"Linear Switch\", \"Aluminum Plate\", \"Poron Foam\", \"USB-C\", and \"Encoder Knob\". Show a compact dimension note \"317 mm x 112 mm x 31 mm\". The composition should feel like an industrial design presentation board: precise spacing, realistic materials, sharp typography, correct labels, and highly legible component hierarchy."},{"id":"technical-illustration-115","no":115,"title":"Car Powertrain Transparent Cutaway","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"Create a high-detail transparent cutaway illustration of a fictional hybrid sports coupe powertrain on a dark neutral studio background. Show the vehicle in side profile with semi-transparent bodywork revealing the front electric motor, battery pack, rear combustion engine, transmission tunnel, cooling loops, and rear differential. Use realistic metallic surfaces, matte graphite body panels, orange high-voltage cables, and blue coolant lines. Add clean engineering callouts with crisp in-image text: \"Project VELA GT\", \"Hybrid Powertrain\", \"System Output 412 kW\", \"Battery 18.6 kWh\", and \"0-100 km/h 3.8 s\". Label key parts \"Inverter\", \"Motor\", \"Battery Pack\", \"Turbo Inline-4\", \"Radiator\", and \"Rear Differential\". Include a simple legend showing cable colors for \"HV\", \"Coolant\", and \"Fuel\". The rendering should be technically believable, photorealistic where appropriate, sharply annotated, and composed like a premium automotive engineering poster."},{"id":"technical-illustration-116","no":116,"title":"Smartphone Internals Layered View","size":"portrait","pixel":"1024x1536","credit":"Curated","prompt":"Produce a sleek exploded-view illustration of a fictional flagship smartphone called the HELIX ONE, shown front and back in a vertically layered assembly on a soft charcoal gradient background. Separate the glass, OLED panel, midframe, battery, camera island, wireless charging coil, logic board, cooling vapor chamber, speakers, and rear shell. Use realistic materials including brushed titanium edges, ceramic back, black glass, copper thermal elements, and blue PCB traces. Add crisp labels and in-image text: \"HELIX ONE\", \"Layered Internal Architecture\", \"6.7 in OLED\", \"5,100 mAh\", and \"Vapor Chamber 3,200 mm2\". Label components \"Main Camera 50 MP\", \"Ultrawide 13 MP\", \"Coil\", \"Battery\", \"Logic Board\", and \"Speaker Module\". Keep the composition elegant, technical, and believable, with exact spacing, sharp typography, clean callout leaders, and premium product-visualization quality."}]},{"slug":"cinematic-and-animation","category":"Cinematic & Animation","title_zh":"電影感與動畫","industries":["marketing","entertainment","general"],"use_cases":["廣告分鏡","形象短片靜幀","活動主視覺"],"count":5,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-cinematic-and-animation.md"},"prompts":[{"id":"cinematic-and-animation-026","no":26,"title":"Pixar-style 3D animation still (kitten)","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"A Pixar-quality 3D animation still, landscape 16:9. Cinematic feature-film look, warm studio lighting.\n\nScene: a cozy apartment kitchen at dawn. A small orange tabby kitten sits on the countertop reaching a paw toward a rising soufflé in the oven; oven glow lighting the scene from below. Soft morning light through linen curtains. A wooden chopping board with a half-peeled lemon, a copper whisk with a small cloud of flour still airborne, a tiny succulent in a clay pot.\n\nCharacter: kitten with expressive, slightly oversized eyes (classic Pixar proportions), individually sculpted whiskers, believable fur with micro-groom direction, curious-slightly-worried expression.\n\nArt direction: full-CG Pixar aesthetic — subsurface scattering on ears and whiskers, physically based materials, soft shadow ambient occlusion, volumetric morning beam, shallow depth of field. Clean stylised shapes consistent with \"Luca\", \"Soul\", \"Elemental\" — not photoreal uncanny-valley."},{"id":"cinematic-and-animation-027","no":27,"title":"1940s film-noir still","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"A 1940s film-noir black-and-white movie still, landscape 16:9, high contrast. Shot on 35mm with visible grain.\n\nScene: a detective in trench coat and fedora stands alone at a rain-soaked street corner at 2 a.m., cigarette in hand, smoke curling upward. Wet cobblestones reflecting a single buzzing street lamp. A \"HOTEL\" neon sign on brick facade with letters \"HOTE_\" (the L flickered out). A vintage 1946 sedan parked at the curb, tail-lights glowing through drizzle.\n\nLighting: classic chiaroscuro — single hard key light above right, venetian-blind shadows on the wall behind him. Deep blacks, silvered highlights, full tonal range from pure white to pure black. No colour. Frame should feel lifted from \"The Maltese Falcon\", \"Double Indemnity\", or \"The Third Man\"."},{"id":"cinematic-and-animation-028","no":28,"title":"Professional 6-panel film storyboard","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"A 6-panel film storyboard laid out as a 3×2 grid, landscape 16:9 overall. Each panel is a rectangular pencil-and-marker sketch with a white margin border and a small information strip underneath.\n\nScene: a chase through a rainy Tokyo alleyway, ending in a rooftop jump.\n\nPanel 1 — WIDE establishing: wet neon alleyway, runner entering from left; kanji signage on both walls. Info: \"PANEL 1 · EXT. ALLEY · NIGHT · WIDE / static / 2s\"\nPanel 2 — OTS tracking: runner mid-stride from behind; pursuer silhouette 10 m back. Info: \"PANEL 2 · OTS TRACKING / follow-cam / pan-L 45° / 3s\"\nPanel 3 — Close-up: runner's face, sweat, eyes darting up toward fire escape. Info: \"PANEL 3 · CU RUNNER / static / 1.5s / SFX: breath\"\nPanel 4 — Low angle: runner leaping onto fire-escape ladder; rain streaks. Info: \"PANEL 4 · LOW ANGLE / tilt-up 30° / 2s\"\nPanel 5 — Wide aerial: runner silhouetted against neon skyline, about to leap rooftops. Info: \"PANEL 5 · WIDE AERIAL / crane-down / 4s\"\nPanel 6 — Match cut: runner's boots landing on wet rooftop; splash. Info: \"PANEL 6 · MATCH CUT CU / static / 1s / SFX: splash\"\n\nArt direction: classic animation-school storyboard — pencil line-work, grey marker shading, red-pencil arrow annotations on panels 2 and 5 (camera move and action arc). Off-white paper texture background."},{"id":"cinematic-and-animation-029","no":29,"title":"Studio-Ghibli-style animation still","size":"landscape","pixel":"1536x1024","credit":"Curated","prompt":"A Studio-Ghibli-style hand-painted animation still, landscape 16:9. A small wooden cottage sits on a grassy hillside overlooking a valley at golden hour. A child stands barefoot at the cottage doorway waving to a small furry forest spirit half-hidden in the meadow grass. A distant train cuts across the valley floor, swallows dip overhead.\n\nArt direction: classic Miyazaki / Studio Ghibli watercolor-gouache style. Soft painterly edges, slightly desaturated greens and warm skin tones, visible brush texture in the clouds and grass. Thin ink line art on the characters. Gentle atmospheric perspective. The whole frame should feel like a cel from \"My Neighbor Totoro\" or \"Kiki's Delivery Service\", not a 3D render."},{"id":"cinematic-and-animation-030","no":30,"title":"VHS grocery-store chaos still","size":"landscape","pixel":"1536x1024","credit":"Author: Unknown","prompt":"Create a chaotic security-camera still from a 1990s grocery store. A man in full medieval armor is frozen mid-sprint stealing several rotisserie chickens past the dairy section. Overhead fluorescent lights reflect off the armor. The floor is baby-blue tile. Add a timestamp reading \"08/13/96 04:44 AM\" and a wall poster saying \"NEW! TOASTER STRUDELS!\". Make it low-fidelity, absurd, slightly intense, with motion blur, VHS color bleed, surveillance noise, and authentic analog-store lighting."}]},{"slug":"scientific-and-educational","category":"Scientific & Educational","title_zh":"科學與教育","industries":["education","research","general"],"use_cases":["教材插圖","概念示意","知識圖卡"],"count":7,"source":{"repo":"wuyoscar/gpt_image_2_skill","license":"CC BY 4.0","url":"https://github.com/wuyoscar/gpt_image_2_skill/blob/main/skills/gpt-image/references/gallery-scientific-and-educational.md"},"prompts":[{"id":"scientific-and-educational-122","no":122,"title":"Anatomy Poster","size":"tall","pixel":"2160x3840","credit":"Curated","prompt":"Create a clean educational anatomy poster showing the human muscular system in anterior and posterior views on a pale cream background. Use an academic but visually refined style with precise linework, muted reds and umbers for muscle groups, cool gray bones, and thin charcoal labels. Include a centered title with crisp in-image text \"Human Muscular System\" and a subtitle \"Anterior and Posterior Views\". Label key structures such as \"Deltoid\", \"Pectoralis Major\", \"Rectus Abdominis\", \"Biceps Femoris\", \"Gastrocnemius\", and \"Trapezius\". Add a compact scale note reading \"Adult height reference 175 cm\" and a small legend with \"Superficial\" and \"Deep\". Keep the composition symmetrical, scientifically accurate in appearance, and suitable for a classroom wall chart. Prioritize correct labels, crisp typography, clean hierarchy, subtle shading, and publication-quality educational clarity without gore or excessive realism."},{"id":"scientific-and-educational-123","no":123,"title":"Skeletal System Poster","size":"tall","pixel":"2160x3840","credit":"Curated","prompt":"Create a clean educational anatomy poster showing the human skeletal system in anterior and posterior views on a pale cream background. Use a refined academic wall-chart style with precise bone linework, cool gray and ivory bone shading, charcoal labels, and subtle blue accent rules. Include a centered title with crisp in-image text \"Human Skeletal System\" and subtitle \"Anterior and Posterior Views\". Label key structures such as \"Skull\", \"Clavicle\", \"Sternum\", \"Humerus\", \"Radius\", \"Ulna\", \"Pelvis\", \"Femur\", \"Tibia\", and \"Fibula\". Add a compact scale note reading \"Adult height reference 175 cm\" and a small legend with \"Axial\" and \"Appendicular\". Keep the composition symmetrical, scientifically accurate in appearance, suitable for a classroom wall chart, non-gory, clean, precise, and publication-quality."},{"id":"scientific-and-educational-124","no":124,"title":"Circulatory System Poster","size":"tall","pixel":"2160x3840","credit":"Curated","prompt":"Create a clean educational anatomy poster showing the human circulatory system in anterior and posterior views on a pale cream background. Use an academic but visually refined medical-wall-chart style with precise vascular linework, muted crimson and deep blue vessels, soft ivory body silhouettes, and thin charcoal labels. Include a centered title with crisp in-image text \"Human Circulatory System\" and subtitle \"Major Arteries and Veins\". Label key structures such as \"Heart\", \"Aorta\", \"Carotid Artery\", \"Vena Cava\", \"Pulmonary Artery\", \"Radial Artery\", \"Femoral Artery\", \"Saphenous Vein\", and \"Capillary Beds\". Add a compact legend with \"Arteries\" and \"Veins\" plus a note reading \"Educational schematic\". Keep the composition symmetrical, scientifically accurate in appearance, classroom-safe, non-gory, highly legible, and publication-quality."},{"id":"scientific-and-educational-125","no":125,"title":"Periodic Table Spectral Variant","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Design a distinctive periodic table poster variant where each element tile is colored by fictional emission-spectrum families while preserving clean scientific layout. Use a dark navy background with luminous but disciplined colors: cyan, magenta, amber, lime, and silver-white. Arrange the periodic table accurately with clear periods and groups, including separate lanthanide and actinide rows. Add a crisp title reading \"Periodic Table of the Elements\" and subtitle \"Spectral Classification Variant\". Ensure visible labels for representative tiles such as \"H 1\", \"He 2\", \"C 6\", \"Fe 26\", \"Ag 47\", and \"U 92\". Include side legends titled \"Alkali\", \"Transition\", \"Metalloid\", \"Noble Gas\", and \"Actinide\". Add small group numbers \"1\" through \"18\" and period numbers \"1\" through \"7\". The result should feel educational, modern, and highly legible, with precise typography, clean cell alignment, balanced glow effects, and accurate table structure."},{"id":"scientific-and-educational-126","no":126,"title":"Tree of Life Poster","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Generate an elegant scientific poster visualizing a stylized tree of life as a radial phylogeny diagram on an ivory background. Use fine botanical-meets-scientific linework with a restrained palette of moss green, deep teal, amber, plum, and charcoal. The diagram should branch outward from a central root labeled with crisp in-image text \"Last Universal Common Ancestor\". Main clades should be labeled \"Bacteria\", \"Archaea\", and \"Eukaryota\", with outer branches including \"Plants\", \"Fungi\", \"Animals\", \"Protists\", and \"Cyanobacteria\". Add a title at the top reading \"Tree of Life\" and a subtitle \"Simplified Radial Phylogeny\". Include a small scale note \"Approximate branching only\". Keep labels readable and branch geometry balanced, with clean hierarchy and educational clarity. The overall design should feel like a museum-science graphic: structured, accurate in spirit, visually rich, and rendered with crisp text and refined detail."},{"id":"scientific-and-educational-127","no":127,"title":"Weather Systems Diagram","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Create a polished meteorology infographic showing a mid-latitude cyclone system from a top-down synoptic view. Use a cool palette of ocean blue, cloud white, storm gray, crimson, and cobalt, with smooth contour lines and crisp symbols. Include pressure isobars, cloud bands, warm and cold fronts, arrows for wind direction, and rainfall zones. Add clear in-image text: \"Mid-Latitude Cyclone\", \"Low Pressure 984 hPa\", \"Warm Front\", \"Cold Front\", and \"Occluded Front\". Include city labels \"Northport\", \"Elmside\", and \"Cedar Bay\" for context, plus a legend reading \"Rain\", \"Snow\", and \"Thunderstorm\". Show temperature markers \"8 C\", \"14 C\", and \"21 C\" in different air masses. The composition should be educational and publication-ready, with sharp labels, clean hierarchy, accurate diagram conventions, and strong visual readability suitable for a textbook or science exhibit panel."},{"id":"scientific-and-educational-128","no":128,"title":"Geological Strata Cross-Section","size":"wide","pixel":"2048x1152","credit":"Curated","prompt":"Produce a detailed geological cross-section poster of layered earth strata cutting through a fictional canyon basin. Use a natural scientific palette of sandstone beige, iron oxide red, shale gray, limestone cream, basalt charcoal, and muted green vegetation above ground. Show clearly differentiated layers, a fault line, an aquifer, fossil-bearing beds, and a volcanic intrusion. Add crisp in-image text: \"Geological Cross-Section\", \"Solterra Basin\", \"Scale 0-500 m\", and labels \"Sandstone\", \"Shale\", \"Limestone\", \"Coal Seam\", \"Aquifer\", and \"Basalt Dike\". Include a vertical scale with \"0 m\", \"100 m\", \"250 m\", and \"500 m\". Add small annotations \"Marine fossils\" and \"Groundwater flow\" with arrows. The composition should be highly legible, educational, and neatly diagrammed, with clean linework, correct label placement, balanced annotation density, and publication-quality scientific illustration clarity."}]},{"slug":"evolink-ecommerce","category":"EvoLinkAI · E-commerce","title_zh":"電商與商品素材","industries":["marketing","retail","hospitality","general"],"use_cases":["電商主圖","商品包裝","廣告主圖"],"count":10,"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"},"prompts":[{"id":"evolink-ecommerce-113","no":113,"title":"E-commerce Main Image - Luxury Amber Perfume Ad","size":"square","pixel":"","credit":"Author: @Polanco_IA","prompt":"A luxurious cinematic product photograph of a classic rectangular perfume bottle inspired by {argument name=\"brand label\" default=\"N°5 CHANEL PARIS PARFUM\"}, placed upright on a glossy black marble surface with white veining. The bottle is centered slightly to the right, made of clear faceted glass with a large transparent crystal stopper, filled with rich amber-gold perfume that glows from within. Tiny condensation droplets cover the glass, adding texture and realism. Dramatic warm lighting from the upper left creates golden highlights, deep reflections on the marble, and a soft luminous bloom in the background. Wisps of elegant smoke curl around the bottle on both sides, enhancing a moody high-end advertisement feel. Dark background, shallow depth of field, ultra-detailed studio product photography, luxury beauty campaign aesthetic, crisp focus on the bottle, realistic reflections, warm black-and-gold color palette. Add a small white {argument name=\"corner logo\" default=\"Pollo.ai\"} in the top-right corner. Square composition, premium commercial ad, photorealistic, high contrast, refined and sophisticated.","industries":["marketing","retail","hospitality","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@Polanco_IA","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ecommerce-114","no":114,"title":"E-commerce Main Image - Skincare Product Studio Shot","size":"square","pixel":"","credit":"Author: @Strength04_X","prompt":"A soft {argument name=\"bottle color\" default=\"cream-colored\"} bottle with a {argument name=\"pump color\" default=\"pastel yellow\"} pump stands on a matte podium, surrounded by silky foam and {argument name=\"flowers\" default=\"chamomile blossoms\"}. The background is a pale yellow gradient with subtle bubble details. The label emphasizes organic chamomile and calming care. Fresh chamomile flowers accentuate the gentle appeal.","industries":["marketing","retail","hospitality","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@Strength04_X","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ecommerce-115","no":115,"title":"E-commerce Main Image - Tropical Citrus Soda Ad Poster","size":"square","pixel":"","credit":"Author: @edimakorfr","prompt":"Create a vibrant tropical commercial poster for a citrus soda bottle, in a bright summer advertising style. Show a single large plastic bottle of {argument name=\"product name\" default=\"Soda\"} centered slightly to the right, tilted a little left, with a yellow cap and transparent bottle covered in cold condensation droplets, filled with glowing golden-orange soda. The label should feature sliced oranges and citrus artwork with the brand text \"{argument name=\"product name\" default=\"Soda\"}\", the phrase \"aux agrumes d'été\", and a small green \"500 ml\" mark. Use a sunny beach background with vivid blue sky, turquoise ocean, soft clouds, and blurred tropical palm leaves entering from the upper right corner. Add dramatic water splashes around the base of the bottle, scattered clear ice cubes, and 5 visible citrus pieces in the foreground: 2 orange wedges, 1 lime half, 1 grapefruit half, and 1 partial orange slice at the far right edge. Place large French promotional text on the left: a huge white headline \"{argument name=\"headline text\" default=\"Soda\"}\" with a small splash accent above it, then yellow script text \"aux agrumes d'été\" underneath. Add a yellow paint-stroke badge at mid-left with the text \"LA FRAÎCHEUR QUI PÉTILLE !\". Add a vertical feature list on the lower left with 3 round icons and French captions: \"SAVEURS NATURELLES\", \"SANS COLORANTS ARTIFICIELS\", and \"EXTRA RAFRAÎCHISSANT\". Add a green brushstroke banner at the bottom left reading \"FORMAT PRATIQUE 500 ml\". Add a round beige eco-style seal at the bottom right with green outline and leaf motif, containing the text \"{argument name=\"seal text\" default=\"PLAISIR FRUITÉ À CHAQUE GORGÉE\"}\". Lighting should be glossy and high-energy with strong sun flare from the upper left, saturated citrus colors, crisp packaging detail, realistic droplets, and polished supermarket-ad realism.","industries":["marketing","retail","hospitality","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@edimakorfr","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ecommerce-116","no":116,"title":"E-commerce Main Image - Industrial Design Presentation Sheet","size":"square","pixel":"","credit":"Author: @ShamsAmin56","prompt":"Core Subject: [{argument name=\"reference\" default=\"use the uploaded image\"}, keep the details, typography and structure locked 100%]\n\nLayout & Composition: A {argument name=\"presentation type\" default=\"professional industrial design presentation sheet\"}. The image should be organized into a clean grid system.\n\nTop Row: A 3x3 layout showing top-down flat lay views and close-up macro details of materials.\n\nMiddle Section: Three hero shots of the product standing upright in different color ways (Matte Black, Arctic White, and accented variants). The products should be slightly tilted to show depth and form.\n\nBottom Section: A dynamic \"floating\" composition featuring two products overlapping at opposing angles to showcase the front and side profiles simultaneously.\n\nEnvironment & Lighting: Set against a minimalist, neutral studio gray background. Soft top-down lighting with realistic contact shadows. High-end product photography aesthetic.\n\nStyle & Finish: Matte textures, clean silhouettes, and sharp edges. Leave designated blank areas on the product surfaces for \"Placeholder Branding\" and \"Graphic Mockups.\" 4k resolution, Unreal Engine 5 render style, hyper-realistic, clean aesthetic.","industries":["marketing","retail","hospitality","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@ShamsAmin56","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ecommerce-117","no":117,"title":"E-commerce Main Image - Luxury Fur-Lined Loafer Lifestyle Photo","size":"square","pixel":"","credit":"Author: @dynamicwangs","prompt":"A warm, editorial-style lifestyle product photo shot indoors from a low close-up angle, focused on a woman's lower legs and feet as she tries on 1 pair of black leather backless loafers with tan faux-fur lining. One loafer is worn on the right foot and the left foot is bare, hovering just above the textured cream shag rug, while the second matching loafer lies on the rug in the lower left foreground. The shoes have smooth black leather uppers, a rounded almond toe, open mule-style heel, plush brown fur spilling out around the opening, and a small polished gold horsebit hardware detail across the vamp. The model wears cropped medium-blue denim jeans with a raw frayed hem. The setting is a cozy minimalist interior with a cream rug featuring 2 thin irregular black lines, a neutral wall, and a leaning rectangular mirror with a medium wood frame in the upper right background, softly reflecting the rug and part of the scene. Use soft natural window light, shallow depth of field, subtle film grain, realistic skin texture, muted beige and black palette, relaxed candid composition, premium fashion catalog mood, high detail, photorealistic.","industries":["marketing","retail","hospitality","general"],"source":{"repo":"EvoLinkAI/awesome-gpt-image-2-prompts","license":"CC BY 4.0","author":"@dynamicwangs","url":"https://github.com/EvoLinkAI/awesome-gpt-image-2-prompts"}},{"id":"evolink-ecommerce-118","no":118,"title":"E-commerce Main Image - Luxury Perfume Ad on Marble Vanity","size":"square","pixel":"","credit":"Author: @MiguelMaestroIA","prompt":"A luxury e-commerce advertising photo of a premium perfume bottle on a polished gray-and-white marble vanity, shot in a warm cinematic studio style with soft golden lighting, shallow depth of field, and
